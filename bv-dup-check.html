<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BV查重</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/site-theme.css?v=20260621ui2">
<script src="/site-shell.js?v=20260621ui2" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f6f7f9;padding:20px}
  .main{max-width:1380px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h2{color:#2c3e50;margin-bottom:8px}
.header p{color:#6c757d;font-size:14px}
.search-box{display:grid;grid-template-columns:minmax(0,1fr) 108px;gap:12px;align-items:end;margin-bottom:18px}
#bvInput{flex:1;min-width:320px;padding:12px 14px;border:1px solid #d0d7de;border-radius:6px;font-size:14px;outline:none;min-height:116px;background:#fff}
#searchBtn{padding:0 18px;height:44px;background:#f3f4f6;color:#111827;border:1px solid #b8c0cc;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;box-shadow:none}
.source-tabs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;padding:0;border:0;align-items:center}
.source-select{min-width:320px;max-width:440px;min-height:34px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:13px;color:#2c3e50}
.source-meta{font-size:12px;color:#667085;white-space:nowrap}
.filter-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;padding:0;background:transparent;border:0;box-shadow:none}
.stat-info{font-size:13px;color:#495057}
.filter-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-btn{padding:8px 14px;background:#f3f4f6;color:#111827;border:1px solid #b8c0cc;border-radius:6px;cursor:pointer;font-size:13px;margin-left:0}
.filter-btn.active{background:#e9edf2;color:#111827;border-color:#94a3b8}
.copy-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.copy-presets{display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%;padding:10px;border:1px solid #d7e1ec;border-radius:8px;background:#f8fafc}
.copy-advanced{width:100%;border:1px solid #d7e1ec;border-radius:8px;background:#fff}
.copy-advanced summary{cursor:pointer;padding:10px 12px;font-size:13px;font-weight:700;color:#334155}
.copy-advanced-body{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:0 10px 10px}
.copy-controls label{font-size:13px;color:#495057;display:flex;align-items:center;gap:4px}
.copy-index-input{width:84px;min-height:34px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.copy-order-select{min-height:34px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#2c3e50}
.copy-separator-input{width:120px;min-height:34px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.copy-btn{padding:8px 14px;background:#f3f4f6;color:#111827;border:1px solid #b8c0cc;border-radius:6px;cursor:pointer;font-size:13px}
.result-list{margin-bottom:30px}
.song-item{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px;border-left:4px solid #ddd;box-shadow:0 2px 4px rgba(0,0,0,.04)}
.song-item.dup{border-left-color:#dc3545}
.song-item.unique{border-left-color:#28a745}
.song-item.not-found{border-left-color:#ffc107}
.song-title{font-weight:600;color:#2c3e50;margin-bottom:8px}
.dup-tag,.unique-tag,.not-found-tag{display:inline-block;color:#fff;font-size:12px;padding:2px 8px;border-radius:4px;margin-left:8px}
.dup-tag{background:#dc3545}.unique-tag{background:#28a745}.not-found-tag{background:#ffc107}
.meta-info{font-size:13px;color:#495057;line-height:1.7}
.dup-list{margin-top:10px}
.dup-item{display:flex;align-items:center;gap:6px;margin-top:4px;padding:4px 8px;background:#f8f9fa;border-radius:4px;font-size:12px}
.bv-tag{display:inline-block;background:#6f42c1;color:#fff;font-size:11px;padding:2px 6px;border-radius:3px}
.copy-toast{position:fixed;bottom:30px;right:30px;padding:10px 20px;background:rgba(0,0,0,.8);color:#fff;border-radius:4px;font-size:14px;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none;z-index:9999}
.copy-toast.show{opacity:1;transform:translateY(0)}
.back-top{position:fixed;right:24px;bottom:24px;width:42px;height:42px;border:1px solid #b8c0cc;border-radius:6px;background:#f3f4f6;color:#111827;font-size:18px;cursor:pointer;box-shadow:none;opacity:0;pointer-events:none;transform:translateY(6px);transition:all .2s;z-index:3000}
.back-top.show{opacity:1;pointer-events:auto;transform:translateY(0)}
@media (max-width: 720px){
  .search-box{grid-template-columns:1fr}
  #searchBtn{width:100%}
  .source-tabs{align-items:stretch}
  .source-select{min-width:0;max-width:none;width:100%}
  .source-meta{white-space:normal}
  .filter-actions{width:100%;justify-content:flex-start}
}
</style>
</head>
<body class="culua-shell-page culua-shell-bv">
<div class="culua-page-shell">
  <aside class="culua-sidebar">
    <div class="culua-brand">
      <div class="culua-brand-title">CULUA</div>
    </div>
    <nav class="culua-shell-nav" aria-label="页面导航">
      <a class="culua-shell-nav-item" href="/">检索 <span>搜索</span></a>
      <a class="culua-shell-nav-item" href="/stats">统计 <span>数据</span></a>
      <a class="culua-shell-nav-item active" href="/bv" aria-current="page">BV 查重 <span>工具</span></a>
      <a class="culua-shell-nav-item" href="/dup">歌名查重 <span>工具</span></a>
      <a class="culua-shell-nav-item" href="/check">命名校验 <span>工具</span></a>
      <a class="culua-shell-nav-item" href="/vocaloid">术力口 <span>数据</span></a>
      <a class="culua-shell-nav-item" href="/growth">增长日报 <span>趋势</span></a>
    </nav>
    <div class="source-tabs" id="tabContainer"></div>
  </aside>
  <main class="culua-page-content">
<div class="dup-page-layout">
<div class="main">
  <div class="header">
    <h2>BV查重</h2>
    <p>输入 BV 号或 B 站链接，快速查看同名重复情况</p>
  </div>

  <section class="bv-workbench" id="bvWorkbench" aria-label="BV 查重工作区">
    <div class="bv-input-card">
      <div class="bv-panel-head">
        <div>
          <div class="bv-panel-title">查重输入</div>
          <div class="bv-panel-meta" id="bvInputMeta">0 个 BV · 全部来源</div>
        </div>
      </div>
      <div class="search-box">
        <textarea id="bvInput" placeholder="每行一个 BV 号或 B 站链接"></textarea>
        <button id="searchBtn">分析</button>
      </div>
    </div>
    <div class="bv-result-summary" id="bvResultSummary" aria-label="查重概览"></div>
  </section>

  <div class="filter-bar">
    <div class="stat-info" id="statInfo">请先输入 BV 开始分析</div>
    <div class="filter-actions">
      <button class="filter-btn active" id="showAllBtn">全部结果</button>
      <button class="filter-btn" id="showUniqueBtn">仅未收录</button>
    </div>
  </div>

  <div class="copy-controls">
    <div class="copy-presets" aria-label="复制预设">
      <button class="copy-btn" type="button" data-copy-preset="titleArtist">复制：歌名 - 歌手</button>
      <button class="copy-btn" type="button" data-copy-preset="titleArtistLink">复制：带链接</button>
      <button class="copy-btn" type="button" data-copy-preset="tsv">复制 TSV</button>
    </div>
    <details class="copy-advanced" id="copyAdvancedFields">
      <summary>高级复制字段</summary>
      <div class="copy-advanced-body">
        <label><input type="checkbox" id="copyOnlyUnique" checked>仅复制未收录</label>
        <label><input type="checkbox" id="copyOriginal">输入值</label>
        <label><input type="checkbox" id="copyTitle" checked>歌名</label>
        <label><input type="checkbox" id="copyArtist" checked>歌手</label>
        <label>链接位次 <input type="number" id="copyDupIndex" class="copy-index-input" step="1" placeholder="1 或 -1"></label>
        <label><input type="checkbox" id="copySource">来源</label>
        <label><input type="checkbox" id="copyLink" checked>链接</label>
        <label><input type="checkbox" id="copyBvid" checked>BV号</label>
        <label><input type="checkbox" id="copyDupCount">已收录数</label>
        <label><input type="checkbox" id="copyStatus">状态</label>
        <label>分隔符 <input type="text" id="copySeparator" class="copy-separator-input" value=" " placeholder="默认空格"></label>
        <label><input type="radio" name="copyFormat" id="copyText" checked>纯文本</label>
        <label><input type="radio" name="copyFormat" id="copyTable">表格</label>
        <button class="copy-btn" id="copyBtn">复制结果</button>
        <button class="copy-btn" id="copyAiBtn" type="button">AI清洗复制</button>
      </div>
    </details>
  </div>

  <div class="result-list" id="resultList"></div>
</div>
<aside class="dup-directory-slot" id="dupDirectorySlot" aria-label="BV查重目录"></aside>
</div>
<div class="copy-toast" id="copyToast">复制成功</div>
<button class="back-top" id="backTopBtn" type="button" aria-label="回到顶部">↑</button>
  </main>
</div>
<script src="/artist-match.js"></script>
<script src="dup-check-core.js?v=20260621included1"></script>
<script src="/page-directory-widget.js?v=20260525avatar1"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initDupCheckPage('bv');
  if (typeof window.createPageDirectory === 'function') {
    const buildDupDirItems = () => {
      const items = [
        { label: '查重输入', selector: '#bvWorkbench' },
        { label: '结果概览', selector: '#bvResultSummary' },
        { label: '歌曲结果', selector: '#resultList' }
      ];
      if (document.querySelector('#resultList .song-item')) {
        items.push({ label: '复制配置', selector: '.copy-controls' });
      }
      return items;
    };

    const dir = window.createPageDirectory({
      title: 'BV查重目录',
      mount: '#dupDirectorySlot',
      items: buildDupDirItems()
    });

    let refreshTimer = null;
    const queueRefresh = () => {
      if (refreshTimer) window.clearTimeout(refreshTimer);
      refreshTimer = window.setTimeout(() => {
        dir.setItems(buildDupDirItems());
      }, 80);
    };

    const resultList = document.getElementById('resultList');
    if (resultList) {
      const observer = new MutationObserver(queueRefresh);
      observer.observe(resultList, { childList: true, subtree: true });
    }
    queueRefresh();
  }
  const backTopBtn = document.getElementById('backTopBtn');
  const updateBackTop = () => backTopBtn.classList.toggle('show', window.scrollY > 260);
  window.addEventListener('scroll', updateBackTop, { passive: true });
  backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  updateBackTop();
});
</script>
  <script src="/last-run-badge.js?v=20260516shell4"></script>
</body>
</html>
