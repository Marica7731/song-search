name: Auto Update Song List

on:
  schedule:
    - cron: '0 * * * *' # 每小时执行，可调整
  workflow_dispatch: # 手动触发

permissions:
  contents: write # 赋予提交代码权限

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 配置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm-dev libxkbcommon-dev libgbm-dev libasound-dev libatspi2.0-0 libxshmfence-dev

      - name: 安装Puppeteer（跳过Chrome下载）
        run: |
          export PUPPETEER_SKIP_DOWNLOAD=true
          npm install -g puppeteer@21.0.0
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV

      - name: 执行更新脚本（容错）
        run: |
          cd scripts
          node update-songs.js
        continue-on-error: true # 个别歌手失败不终止流程

      - name: 更新术力口快照
        run: npm run update:vocaloid -- --source local

      - name: 检查数据更新
        id: check_changes
        run: |
          if git status --porcelain -- data vocaloid-songs-latest | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交更新（仅当有变化时）
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自动更新歌单数据和术力口快照（部分失败见日志）"
          file_pattern: "data/*.js data/index.json vocaloid-songs-latest/**"
          branch: main
