name: Auto Update Song List

on:
  workflow_dispatch: # 由雨云定时分发或手动触发

permissions:
  contents: write # 赋予提交代码权限

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_BV_SAMPLE_SIZE: '3'
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 准备抽样状态目录
        run: mkdir -p reports

      - name: 恢复 BV 抽样状态
        uses: actions/cache@v4
        with:
          path: reports/github-bv-sampling-state.json
          key: ${{ runner.os }}-github-bv-sampling-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-github-bv-sampling-

      - name: 配置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm-dev libxkbcommon-dev libgbm-dev libasound-dev libatspi2.0-0 libxshmfence-dev

      - name: 安装Puppeteer（跳过Chrome下载）
        run: |
          export PUPPETEER_SKIP_DOWNLOAD=true
          npm install -g puppeteer@21.0.0
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV

      - name: 执行更新脚本（容错）
        run: |
          cd scripts
          node update-songs.js
        continue-on-error: true # 个别歌手失败不终止流程

      - name: 检查数据更新
        id: check_changes
        run: |
          if git status --porcelain -- data/*.js data/index.json | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交更新（仅当有变化时）
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- data/*.js data/index.json
          if git diff --cached --quiet; then
            echo "没有需要提交的数据变化"
            exit 0
          fi

          git commit -m "🤖 自动更新歌单数据（部分失败见日志）"

          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              echo "数据更新已推送到 main"
              exit 0
            fi

            git rebase --abort || true
            echo "推送失败，等待后重试：第 ${attempt} 次"
            sleep $((attempt * 10))
          done

          echo "多次推送失败，请检查并行任务的提交冲突"
          exit 1
