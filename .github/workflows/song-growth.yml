name: Song Growth Report

on:
  schedule:
    # Shanghai 00:00 / 12:00 = UTC 16:00 / 04:00
    - cron: '0 4,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build song growth report
        run: node scripts/update-song-growth.js

      - name: Check changes
        id: check_changes
        run: |
          if git status --porcelain | grep -qE 'README.md|song-growth.html|reports/song-growth-history.json'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📈 自动更新歌曲总量日报"
          file_pattern: "README.md song-growth.html reports/song-growth-history.json"
          branch: main
