                        try {
                            detailGroup = await ensureStatsDetail(group);
                            renderGroupList(currentStatsPayload ? currentStatsPayload.items : data, listElId, type);
                        } catch (error) {
                            showToast(`加载完整列表失败：${error.message}`, 'error');
                            return;
                        }
                    }

                    const sourceKey = (detailGroup.sourceFile || '').replace('.js', '');
                    const sourceAlias = FILE_TO_ALIAS[sourceKey] || detailGroup.name;
                    
                    if (type === 'vtuber') {
                        const columns = [
                            { key: 'title', label: '歌名' },
                            { key: 'artist', label: '歌手' },
                            { key: 'source', label: '来源' },
                            { key: 'collection', label: '场次名称' },
                            { key: 'link', label: '场次链接' }
                        ];
                        
                        const dataWithSource = detailGroup.songs.map(song => ({
                            ...song,
                            source: sourceAlias
                        }));
                        
                        showModal('vtuber', dataWithSource, columns, true);
                    } else if (type === 'artist') {
                        const columns = [
                            { key: 'title', label: '歌名' },
                            { key: 'source', label: '来源' },
                            { key: 'collection', label: '场次名称' },
                            { key: 'link', label: '场次链接' }
                        ];
                        
                        const modalData = [];
                        detailGroup.songs.forEach(song => {
                            song.links.forEach(link => {
                                modalData.push({
                                    title: song.title,
                                    source: link.source || '',
                                    collection: link.collection,
                                    link: link.link,
                                    count: 1 // 添加count用于排序
                                });
                            });
                        });
                        
                        showModal('artist', modalData, columns, false);
                    }
                });
                bindQuickCopy(li);
            });
        }

        // --- Tab 2 渲染: 按VTuber来源分类 ---
        function renderVtuberSourceList(data, alreadyAggregated = false) {
            const aggData = sortStatsGroupsLocal(alreadyAggregated ? data : aggregateByVtuberSource(data));
            renderOverviewCards(
                isApiMode && currentStatsPayload ? currentStatsPayload.overview : buildOverviewByTabLocal('vtuber-source', data, aggData),
                isApiMode && currentStatsPayload ? currentStatsPayload.total : aggData.length
            );
            if (!isApiMode) {
                setSummaryText(`${aggData.length} 位 VTuber`);
            }
            renderGroupList(aggData, 'vtuber-source-list', 'vtuber');
            renderPagination(isApiMode && currentStatsPayload ? currentStatsPayload.total : aggData.length);
        }

        // --- Tab 3 渲染: 按歌手分类 ---
        function renderArtistList(data, alreadyAggregated = false) {
            const aggData = alreadyAggregated ? data : aggregateByArtist(data);
            renderOverviewCards(
                isApiMode && currentStatsPayload ? currentStatsPayload.overview : buildOverviewByTabLocal('artist', data, aggData),
                isApiMode && currentStatsPayload ? currentStatsPayload.total : aggData.length
            );
            if (!isApiMode) {
                setSummaryText(`${aggData.length} 位歌手`);
            }
            renderGroupList(aggData, 'artist-list', 'artist');
            renderPagination(isApiMode && currentStatsPayload ? currentStatsPayload.total : aggData.length);
        }

        // 分页渲染
        function renderPagination(total) {
            const el = document.getElementById('pagination-rank');
            el.innerHTML = '';
            const pageSize = getStatsPageSize(activeTab);
            const totalPages = Math.ceil(total / pageSize);
            if (totalPages <= 1) return;

            const prev = document.createElement('button');
            prev.className = `page-btn ${currentRankPage === 1 ? 'disabled' : ''}`;
            prev.textContent = '上一页';
            prev.onclick = () => { 
                if(currentRankPage>1) { 
                    currentRankPage--; 
                    updateAllViews(); 
                } 
            };
            el.appendChild(prev);

            const start = Math.max(1, currentRankPage - 5);
            const end = Math.min(totalPages, currentRankPage + 5);

            if (start > 1) {
                const first = document.createElement('button');
                first.className = 'page-btn';
                first.textContent = '1';
                first.onclick = () => {
                    currentRankPage = 1;
                    updateAllViews();
                };
                el.appendChild(first);

                if (start > 2) {
                    const dots = document.createElement('button');
                    dots.className = 'page-btn disabled';
                    dots.textContent = '...';
                    dots.disabled = true;
                    el.appendChild(dots);
                }
            }

            for(let i=start; i<=end; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentRankPage ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => { 
                    currentRankPage = i; 
                    updateAllViews(); 
                };
                el.appendChild(btn);
            }

            if (end < totalPages) {
                if (end < totalPages - 1) {
                    const dots = document.createElement('button');
                    dots.className = 'page-btn disabled';
                    dots.textContent = '...';
                    dots.disabled = true;
                    el.appendChild(dots);
                }

                const last = document.createElement('button');
                last.className = 'page-btn';
                last.textContent = totalPages;
                last.onclick = () => {
                    currentRankPage = totalPages;
                    updateAllViews();
                };
                el.appendChild(last);
            }

            const next = document.createElement('button');
            next.className = `page-btn ${currentRankPage === totalPages ? 'disabled' : ''}`;
            next.textContent = '下一页';
            next.onclick = () => { 
                if(currentRankPage < totalPages) { 
                    currentRankPage++; 
                    updateAllViews(); 
                } 
            };
            el.appendChild(next);
        }

        // ========== 4. 总控与初始化 ==========

        async function fetchStatsView(tab, source, keyword, page) {
            const requestTab = tab || activeTab;
            const params = new URLSearchParams({
                tab: requestTab,
                source: source || activeFilter,
                q: keyword || searchKeyword,
                sort: statsSort,
                page: String(getStatsRequestPage(requestTab, page || currentRankPage)),
                pageSize: String(getStatsPageSize(requestTab))
            });
            const res = await fetch(`/api/stats/view?${params.toString()}`);
            if (!res.ok) throw new Error(`统计接口失败（状态码：${res.status}）`);
            return res.json();
        }

        async function fetchStatsDetail(key) {
            const params = new URLSearchParams({
                tab: activeTab,
                source: activeFilter,
                q: searchKeyword,
                key
            });
            const res = await fetch(`/api/stats/detail?${params.toString()}`);
            if (!res.ok) throw new Error(`详情接口失败（状态码：${res.status}）`);
            const payload = await res.json();
            return payload.item || null;
        }

        function mergeStatsDetailIntoCurrentPayload(detailItem) {
            if (!currentStatsPayload || !Array.isArray(currentStatsPayload.items) || !detailItem?.key) return;
            const index = currentStatsPayload.items.findIndex(item => item.key === detailItem.key);
            if (index === -1) return;
            currentStatsPayload.items[index] = detailItem;
        }

        async function ensureStatsDetail(item) {
            if (!item?.key) return item;
            if (item.fullLoaded) return item;
            const cacheKey = getStatsDetailCacheKey(activeTab, activeFilter, searchKeyword, item.key);
            if (statsDetailCache.has(cacheKey)) {
                const cached = statsDetailCache.get(cacheKey);
                mergeStatsDetailIntoCurrentPayload(cached);
                return cached;
            }
            const detailItem = await fetchStatsDetail(item.key);
            if (detailItem) {
                statsDetailCache.set(cacheKey, detailItem);
                mergeStatsDetailIntoCurrentPayload(detailItem);
                return detailItem;
            }
            return item;
        }

        async function updateAllViews() {
            generateFilterButtons();
            const requestSeq = ++statsViewRequestSeq;
            const requestTab = activeTab;
            const requestFilter = activeFilter;
            const requestKeyword = searchKeyword;
            const requestPage = currentRankPage;

            if (isApiMode) {
                try {
                    currentStatsPayload = await fetchStatsView(requestTab, requestFilter, requestKeyword, requestPage);
                    if (requestSeq !== statsViewRequestSeq) return;
                    currentRankPage = requestTab === 'vtuber-source' ? 1 : (currentStatsPayload.page || currentRankPage);
                    setSummaryText(currentStatsPayload.summaryText || '');
                    if (!currentStatsPayload.hasData || !Array.isArray(currentStatsPayload.items) || currentStatsPayload.items.length === 0) {
                        renderOverviewCards(currentStatsPayload.overview || {}, currentStatsPayload.total || 0);
                        document.getElementById('empty-msg').style.display = 'block';
                        document.getElementById('rank-list').innerHTML = '';
                        document.getElementById('vtuber-source-list').innerHTML = '';
                        document.getElementById('artist-list').innerHTML = '';
                        renderPagination(currentStatsPayload.total || 0);
                        return;
                    }

                    document.getElementById('empty-msg').style.display = 'none';
                    if (requestTab === 'rank') {
                        renderRankList(currentStatsPayload.items, true);
                    } else if (requestTab === 'vtuber-source') {
                        renderVtuberSourceList(currentStatsPayload.items, true);
                    } else if (requestTab === 'artist') {
                        renderArtistList(currentStatsPayload.items, true);
                    }
                    return;
                } catch (error) {
                    if (requestSeq !== statsViewRequestSeq) return;
                    console.error('服务端统计失败：', error);
                    currentStatsPayload = null;
                    if (originalData.length === 0) {
                        try {
                            await ensureLocalDataLoaded();
                        } catch (fallbackError) {
                            console.error('本地统计数据回退失败：', fallbackError);
                            setSummaryText('统计接口暂时不可用，请稍后重试');
                            document.getElementById('empty-msg').style.display = 'none';
                            return;
                        }
                    }
                    isApiMode = false;
                }
            }

            const data = getFilteredData();
            
            if (data.length === 0) {
                renderOverviewCards(buildOverviewByTabLocal(activeTab, [], []), 0);
                document.getElementById('empty-msg').style.display = 'block';
                document.getElementById('rank-list').innerHTML = '';
                document.getElementById('vtuber-source-list').innerHTML = '';
                document.getElementById('artist-list').innerHTML = '';
                setSummaryText('当前筛选下没有数据');
            } else {
                document.getElementById('empty-msg').style.display = 'none';
                if (activeTab === 'rank') {
                    renderRankList(data);
                } else if (activeTab === 'vtuber-source') {
                    renderVtuberSourceList(data);
                } else if (activeTab === 'artist') {
                    renderArtistList(data);
                }
            }
        }

        function switchTab(tab) {
            if (!['vtuber-source', 'rank', 'artist'].includes(tab)) return;
            activeTab = tab;
            currentRankPage = 1;
            syncStatsNavigation();
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            saveStatsViewPrefs();
            updateAllViews();
        }

        function loadScriptsParallel(fileList) {
            const progressMsg = document.getElementById('progress-msg');
            let loadedCount = 0;
            const totalFiles = fileList.length;

            const promises = fileList.map(fileName => {
                return new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = `data/${fileName}`;
                    script.onload = () => {
                        const newDataCount = window.SONG_DATA.length - originalData.length;
                        if (newDataCount > 0) {
                            const newData = window.SONG_DATA.slice(-newDataCount);
                            newData.forEach(item => item.source = fileName);
                            originalData = [...window.SONG_DATA];
                        }
                        loadedCount++;
                        progressMsg.textContent = `📥 加载数据 (${loadedCount}/${totalFiles})...`;
                        resolve();
                    };
                    script.onerror = () => resolve();
                    document.body.appendChild(script);
                });
            });
            return Promise.all(promises);
        }

        async function ensureLocalDataLoaded() {
            if (originalData.length > 0) return;
            if (staticFallbackPromise) {
                await staticFallbackPromise;
                return;
            }

            staticFallbackPromise = (async () => {
                const progressMsg = document.getElementById('progress-msg');
                if (progressMsg) {
                    progressMsg.style.display = 'block';
                    progressMsg.textContent = '统计接口波动，正在切换本地数据...';
                }

                if (!Array.isArray(fileNames) || fileNames.length === 0) {
                    const res = await fetch('data/index.json');
                    if (!res.ok) throw new Error('无法加载 index.json');
                    const config = await res.json();
                    fileNames = config.files || [];
                    FILE_TO_ALIAS = config.fileToAlias || FILE_TO_ALIAS;
                    SOURCE_PROFILES = config.sourceProfiles || SOURCE_PROFILES;
                }

                if (!fileNames.length) {
                    throw new Error('缺少可用的数据文件');
                }

                window.SONG_DATA = [];
                originalData = [];
                await loadScriptsParallel(fileNames);
                if (originalData.length === 0) {
                    throw new Error('本地静态数据为空');
                }

                bootstrapTotalSongs = originalData.length;
                bootstrapTotalUnique = getUniqueSongCount(originalData);
                SOURCE_STATS = {};

                if (progressMsg) {
                    progressMsg.style.display = 'none';
                }
            })();

            try {
                await staticFallbackPromise;
            } finally {
                staticFallbackPromise = null;
            }
        }

        async function loadAllDataFromApi() {
            const res = await fetch('/api/bootstrap');
            if (!res.ok) throw new Error(`API 状态码 ${res.status}`);
            const payload = await res.json();
            fileNames = payload.files || [];
            FILE_TO_ALIAS = payload.fileToAlias || {};
            SOURCE_PROFILES = payload.sourceProfiles || {};
            SOURCE_STATS = payload.sourceStats || {};
            bootstrapTotalSongs = payload.totalSongs || 0;
            bootstrapTotalUnique = payload.totalUnique || 0;
            originalData = [];
            isApiMode = true;
        }

        async function bootstrap() {
            try {
                try {
                    await loadAllDataFromApi();
                } catch (apiError) {
                    console.warn('API 数据加载失败，回退到静态模式：', apiError);
                    isApiMode = false;
                    const res = await fetch('data/index.json');
                    if (!res.ok) throw new Error('无法加载 index.json');
                    const config = await res.json();
                    fileNames = config.files || [];
                    FILE_TO_ALIAS = config.fileToAlias || {};
                    SOURCE_PROFILES = config.sourceProfiles || {};
                    SOURCE_STATS = {};
                    await loadScriptsParallel(fileNames);
                }

                document.getElementById('progress-msg').style.display = 'none';
                restoreStatsViewPrefs();
                
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
                });
                document.querySelectorAll('.stats-view-nav-item').forEach(btn => {
                    btn.addEventListener('click', () => switchTab(btn.dataset.statsTab));
                });

                const searchInput = document.getElementById('search-input');
                const searchBtn = document.getElementById('search-btn');
                
                const doSearch = () => {
                    searchKeyword = searchInput.value.trim();
                    currentRankPage = 1;
                    saveStatsViewPrefs();
                    updateAllViews();
                };

                searchBtn.addEventListener('click', doSearch);
                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') doSearch();
                });
                document.getElementById('summary-link-limit')?.addEventListener('input', saveStatsViewPrefs);
                document.getElementById('stats-sort-select')?.addEventListener('change', event => {
                    statsSort = event.target.value || 'songs-desc';
                    currentRankPage = 1;
                    syncStatsNavigation();
                    updateAllViews();
                });
                document.getElementById('statsSourceFilter')?.addEventListener('input', () => {
                    renderStatsSourceNav();
                });
                document.getElementById('statsSourceClear')?.addEventListener('click', () => {
                    activeFilter = 'all';
                    currentRankPage = 1;
                    saveStatsViewPrefs();
                    updateAllViews();
                });

                // 模态框事件绑定
                const modal = document.getElementById('copy-modal');
                modal.querySelector('.modal-close').addEventListener('click', hideModal);
                modal.querySelector('.modal-btn.cancel').addEventListener('click', hideModal);
                modal.querySelector('.modal-btn.confirm').addEventListener('click', () => {
                    const content = generateCopyContent();
                    if (content) {
                        copyToClipboard(content);
                        hideModal();
                    }
                });
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) hideModal();
                });

                generateFilterButtons();
                updateAllViews();

            } catch (err) {
                console.error(err);
                document.getElementById('progress-msg').textContent = `❌ 加载失败: ${err.message}`;
            }
        }

        function initBackTop() {
            const backTopBtn = document.getElementById('backTopBtn');
            if (!backTopBtn) return;
            const updateBackTop = () => backTopBtn.classList.toggle('show', window.scrollY > 260);
            window.addEventListener('scroll', updateBackTop, { passive: true });
            backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
            updateBackTop();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initBackTop();
            bootstrap();
        });
    </script>
