    <script>
        window.SONG_DATA = [];
        let originalData = [];
        let filteredBySource = [];
        let filteredBySearch = [];
        const PAGE_SIZE = 50;
        let currentPage = 1;
        let activeSource = 'all';
        const fileNames = [];
        let FILE_TO_ALIAS = {};

        function showCopyToast() {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showCopyToast();
            } catch (err) {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制');
            }
        }

        function isValidArtist(artist) {
            if (!artist || artist.trim() === '') return false;
            if (artist.includes('来源处未提供标准格式歌手')) return false;
            return true;
        }

        function normalizeString(str) {
            if (!str) return '';
            let s = str.trim();
            // 全角转半角（仅对符号/数字/英文生效，不破坏日语假名）
            s = s.replace(/[\uFF01-\uFF5E]/g, function(ch) {
                return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
            });
            s = s.replace(/\u3000/g, ' ');
            // 统一特殊符号，不修改日语内容
            s = s.replace(/[～〜˜]/g, '~');
            s = s.replace(/[—–―]/g, '-');
            s = s.replace(/[“”]/g, '"').replace(/[‘’]/g, "'");
            s = s.replace(/…/g, '...');
            // 合并多余空格
            s = s.replace(/\s+/g, ' ');
            return s.toLowerCase();
        }

        function hasContinuousCommonStr(str1, str2, minLength = 2) {
            const s1 = normalizeString(str1);
            const s2 = normalizeString(str2);
            if (s1.length < minLength || s2.length < minLength) return false;
            for (let i = 0; i <= s1.length - minLength; i++) {
                const subStr = s1.substring(i, i + minLength);
                if (s2.includes(subStr)) return true;
            }
            return false;
        }

        function isSameSong(songA, songB) {
            const titleA = normalizeString(songA.title || '未知歌曲');
            const titleB = normalizeString(songB.title || '未知歌曲');
            if (titleA !== titleB) return false;

            const artistA = (songA.artist || '').trim();
            const artistB = (songB.artist || '').trim();
            const validA = isValidArtist(artistA);
            const validB = isValidArtist(artistB);

            if (!validA || !validB) return true;

            const normArtistA = normalizeString(artistA);
            const normArtistB = normalizeString(artistB);
            return normArtistA === normArtistB || hasContinuousCommonStr(artistA, artistB);
        }

        function getUniqueSongCount(data) {
            if (data.length === 0) return 0;
            
            const titleGroup = {};
            data.forEach(song => {
                const titleKey = normalizeString(song.title || '未知歌曲');
                if (!titleGroup[titleKey]) titleGroup[titleKey] = [];
                titleGroup[titleKey].push(song);
            });

            let totalUnique = 0;
            Object.values(titleGroup).forEach(group => {
                if (group.length === 1) {
                    totalUnique++;
                    return;
                }
                const uniqueSongs = [];
                group.forEach(currentSong => {
                    const isDuplicate = uniqueSongs.some(savedSong => isSameSong(currentSong, savedSong));
                    if (!isDuplicate) uniqueSongs.push(currentSong);
                });
                totalUnique += uniqueSongs.length;
            });

            return totalUnique;
        }

        function getCopyOptions() {
            return {
                title: document.getElementById('copy-title').checked,
                artist: document.getElementById('copy-artist').checked,
                collection: document.getElementById('copy-collection').checked,
                source: document.getElementById('copy-source').checked,
                link: document.getElementById('copy-link').checked,
                bvid: document.getElementById('copy-bvid').checked,
                validArtistOnly: document.getElementById('copy-valid-artist-only').checked,
                separator: document.getElementById('copy-separator').value,
                textFormat: document.getElementById('copy-format-text').checked
            };
        }

        function generateSearchResultText() {
            if (filteredBySearch.length === 0) return '';

            const options = getCopyOptions();
            const sourceLabel = (item) => {
                const sourceBase = item.source?.replace('.js', '');
                return FILE_TO_ALIAS[sourceBase] || item.source || '未知';
            };

            let copyData = [...filteredBySearch];
            if (options.validArtistOnly) {
                copyData = copyData.filter(item => isValidArtist(item.artist));
            }
            if (copyData.length === 0) return '';

            let separator = options.separator;
            if (separator == null || separator === '') separator = ' ';
            if (separator === '\\t') separator = '\t';

            if (options.textFormat) {
                return copyData.map(item => {
                    const parts = [];
                    if (options.title) parts.push(item.title || '未知歌曲');
                    if (options.artist && isValidArtist(item.artist)) parts.push(item.artist.trim());
                    if (options.collection) parts.push(`合集:${item.collection || '未知'}`);
                    if (options.source) parts.push(`来源:${sourceLabel(item)}`);
                    if (options.link) parts.push(item.link || '');
                    if (options.bvid) parts.push(extractBvid(item.link) || '');
                    return parts.join(separator);
                }).join('\n');
            }

            const headers = [];
            if (options.title) headers.push('歌名');
            if (options.artist) headers.push('歌手');
            if (options.collection) headers.push('合集');
            if (options.source) headers.push('来源');
            if (options.link) headers.push('链接');
            if (options.bvid) headers.push('BV号');

            let content = headers.join('\t') + '\n';
            copyData.forEach(item => {
                const row = [];
                if (options.title) row.push(item.title || '未知歌曲');
                if (options.artist) row.push(isValidArtist(item.artist) ? item.artist.trim() : '');
                if (options.collection) row.push(item.collection || '未知');
                if (options.source) row.push(sourceLabel(item));
                if (options.link) row.push(item.link || '');
                if (options.bvid) row.push(extractBvid(item.link) || '');
                content += row.join('\t') + '\n';
            });
            return content.trim();
        }

        async function copyAllSearchResults() {
            const text = generateSearchResultText();
            if (!text) {
                alert('暂无搜索结果可复制');
                return;
            }
            await copyToClipboard(text);
        }

        function extractBvid(link) {
            if (!link) return null;
            const match = link.match(/BV[a-zA-Z0-9]+/);
            return match ? match[0] : null;
        }

        function getActiveSearchFields() {
            return {
                title: document.getElementById('search-title').checked,
                artist: document.getElementById('search-artist').checked,
                collection: document.getElementById('search-collection').checked,
                source: document.getElementById('search-source').checked
            };
        }

        // ========== 高级搜索解析器 ==========
        function parseSearchQuery(query) {
            if (!query || !query.trim()) return null;
            
            const q = query.trim();
            
            // 1. 双引号：精确匹配 "关键词"
            const exactMatchRegex = /^"([^"]+)"$/;
            const exactMatch = q.match(exactMatchRegex);
            if (exactMatch) {
                return {
                    type: 'exact',
                    value: normalizeString(exactMatch[1])
                };
            }
            
            // 2. 单引号：短语模糊匹配 '关键词'
            const phraseMatchRegex = /^'([^']+)'$/;
            const phraseMatch = q.match(phraseMatchRegex);
            if (phraseMatch) {
                return {
                    type: 'phrase',
                    value: normalizeString(phraseMatch[1])
                };
            }
            
            // 3. OR 逻辑
            if (q.toUpperCase().includes(' OR ')) {
                const parts = q.split(/\s+OR\s+/i);
                return {
                    type: 'or',
                    values: parts.map(p => parseSearchQuery(p.trim())).filter(Boolean)
                };
            }
            
            // 4. AND 逻辑（显式 AND 或 空格），自动把「-」替换为空格，适配「歌名 - 歌手」格式
            const processedQuery = q.replace(/\s*-\s*/g, ' ');
            
            let andParts = [];
            if (processedQuery.toUpperCase().includes(' AND ')) {
                andParts = processedQuery.split(/\s+AND\s+/i);
            } else {
                // 按空格分割，保留引号内的内容
                andParts = splitWithQuotes(processedQuery);
            }
            
            if (andParts.length > 1) {
                return {
                    type: 'and',
                    values: andParts.map(p => parseSearchQuery(p.trim())).filter(Boolean)
                };
            }
            
            // 5. 默认：模糊匹配
            return {
                type: 'fuzzy',
                value: normalizeString(processedQuery)
            };
        }

        function splitWithQuotes(str) {
            const result = [];
            let current = '';
            let inQuotes = false;
            let quoteChar = '';
            
            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                if ((char === '"' || char === "'") && !inQuotes) {
                    inQuotes = true;
                    quoteChar = char;
                } else if (char === quoteChar && inQuotes) {
                    inQuotes = false;
                    quoteChar = '';
                } else if (char === ' ' && !inQuotes) {
                    if (current.trim()) {
                        result.push(current.trim());
                        current = '';
                    }
                } else {
                    current += char;
                }
            }
            if (current.trim()) {
                result.push(current.trim());
            }
            return result;
        }

        // ========== 单条件匹配函数 ==========
        function matchesSingleCondition(text, condition) {
            if (!text) return false;
            const normText = normalizeString(text);
            
            switch (condition.type) {
                case 'exact':
                    return normText === condition.value;
                case 'phrase':
                case 'fuzzy':
                    return normText.includes(condition.value);
                default:
                    return false;
            }
        }

        // ========== 【核心修复】跨字段搜索匹配主函数 ==========
        function searchItem(item, condition, fields) {
            // 先获取当前歌曲所有启用字段的文本内容
            const sourceBase = item.source?.replace('.js', '');
            const sourceAlias = FILE_TO_ALIAS[sourceBase] || item.source || '未知';
            
            const fieldTexts = {
                title: item.title || '',
                artist: item.artist || '',
                collection: item.collection || '',
                source: sourceAlias
            };

            // 过滤出用户启用的字段
            const enabledFields = Object.entries(fields)
                .filter(([_, enabled]) => enabled)
                .map(([field, _]) => fieldTexts[field]);

            if (enabledFields.length === 0) return false;

            // 递归判断条件是否满足（支持跨字段）
            function checkCondition(cond) {
                switch (cond.type) {
                    // 基础条件：只要有一个启用的字段满足即可
                    case 'exact':
                    case 'phrase':
                    case 'fuzzy':
                        return enabledFields.some(text => matchesSingleCondition(text, cond));
                    
                    // AND条件：所有子条件都必须满足
                    case 'and':
                        return cond.values.every(subCond => checkCondition(subCond));
                    
                    // OR条件：至少一个子条件满足
                    case 'or':
                        return cond.values.some(subCond => checkCondition(subCond));
                    
                    default:
                        return false;
                }
            }

            return checkCondition(condition);
        }

        function loadScriptsParallel(fileList) {
            const progressMsg = document.getElementById('progress-msg');
            let loadedCount = 0;
            const totalFiles = fileList.length;

            const promises = fileList.map(fileName => {
                return new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = `data/${fileName}`;
                    
                    script.onload = () => {
                        const currentTotalLength = window.SONG_DATA.length;
                        const lastOriginalLength = originalData.length;
                        const newDataCount = currentTotalLength - lastOriginalLength;
                        
                        if (newDataCount > 0) {
                            const newData = window.SONG_DATA.slice(-newDataCount);
                            newData.forEach(item => {
                                item.source = fileName;
                            });
                            originalData = [...window.SONG_DATA];
                        }

                        loadedCount++;
                        progressMsg.textContent = `📥 正在并行加载歌库（${loadedCount}/${totalFiles}个文件）...`;
                        resolve();
                    };
                    
                    script.onerror = () => {
                        console.error(`❌ 加载失败：${fileName}`);
                        loadedCount++;
                        progressMsg.textContent = `📥 正在并行加载歌库（${loadedCount}/${totalFiles}个文件，部分失败）...`;
                        resolve();
                    };
                    
                    document.body.appendChild(script);
                });
            });

            return Promise.all(promises);
        }

        function generateFilterButtons() {
            const filterBar = document.getElementById('filter-bar');
            filterBar.innerHTML = '<span class="filter-label">🔍 按歌手/来源筛选：</span>';

            const allBtn = document.createElement('button');
            allBtn.className = `filter-btn ${activeSource === 'all' ? 'active' : ''}`;
            allBtn.textContent = '全部';
            allBtn.onclick = () => switchSource('all');
            filterBar.appendChild(allBtn);

            const spacer = document.createElement('span');
            spacer.style.width = '10px';
            filterBar.appendChild(spacer);

            fileNames.forEach(fileName => {
                const fileBase = fileName.replace('.js', '');
                const btnText = FILE_TO_ALIAS[fileBase] || fileBase;
                const btn = document.createElement('button');
                btn.className = `filter-btn ${activeSource === fileName ? 'active' : ''}`;
                btn.textContent = btnText;
                btn.onclick = () => switchSource(fileName);
                filterBar.appendChild(btn);
            });

            const missingBtn = document.createElement('button');
            missingBtn.className = `filter-btn missing-artist ${activeSource === 'missing-artist' ? 'active' : ''}`;
            missingBtn.textContent = '⚠️ 缺失歌手';
            missingBtn.onclick = () => switchSource('missing-artist');
            filterBar.appendChild(missingBtn);

            const clearBtn = document.createElement('button');
            clearBtn.className = 'filter-btn clear';
            clearBtn.textContent = '清空筛选';
            clearBtn.onclick = () => {
                activeSource = 'all';
                document.getElementById('search-input').value = '';
                updateFilterAndSearch();
            };
            filterBar.appendChild(clearBtn);
        }

        function switchSource(source) {
            activeSource = source;
            currentPage = 1;
            generateFilterButtons();
            updateFilterAndSearch();
        }

        function updateFilterAndSearch() {
            // 1. 来源筛选
            if (activeSource === 'all') {
                filteredBySource = [...originalData];
            } else if (activeSource === 'missing-artist') {
                filteredBySource = originalData.filter(item => !isValidArtist(item.artist));
            } else {
                filteredBySource = originalData.filter(item => item.source === activeSource);
            }

            // 2. 关键词搜索
            const keyword = document.getElementById('search-input').value.trim();
            const fields = getActiveSearchFields();

            if (!fields.title && !fields.artist && !fields.collection && !fields.source) {
                filteredBySearch = [...filteredBySource];
            } else if (keyword) {
                const condition = parseSearchQuery(keyword);
                if (condition) {
                    filteredBySearch = filteredBySource.filter(item => searchItem(item, condition, fields));
                } else {
                    filteredBySearch = [...filteredBySource];
                }
            } else {
                filteredBySearch = [...filteredBySource];
            }

            // 3. 更新UI
            updateStats();
            const copyAllBtn = document.getElementById('copy-all-btn');
            copyAllBtn.disabled = filteredBySearch.length === 0;
            
            renderSongList(filteredBySearch);
        }

        function updateStats() {
            const statsMsg = document.getElementById('stats-msg');
            const uniqueOriginal = getUniqueSongCount(originalData);
            const uniqueFiltered = getUniqueSongCount(filteredBySource);
            const uniqueSearch = getUniqueSongCount(filteredBySearch);
            
            statsMsg.textContent = `总歌曲数：${originalData.length}（去重：${uniqueOriginal}）| 筛选后：${filteredBySource.length}（去重：${uniqueFiltered}）| 搜索结果：${filteredBySearch.length}（去重：${uniqueSearch}）`;
        }

        function renderSongList(data) {
            const songListEl = document.getElementById('song-list');
            songListEl.innerHTML = '';

            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageData = data.slice(start, end);

            if (pageData.length === 0) {
                document.getElementById('empty-msg').style.display = 'block';
            } else {
                document.getElementById('empty-msg').style.display = 'none';
                pageData.forEach(item => {
                    const sourceBase = item.source?.replace('.js', '');
                    const sourceAlias = FILE_TO_ALIAS[sourceBase] || item.source || '未知';
                    const isLinkValid = item.link && /BV\w+/.test(item.link);
                    const bvid = extractBvid(item.link);
                    const hasValidArtist = isValidArtist(item.artist);

                    const titleHtml = `<div class="copy-wrapper">
                        <div class="song-title">${item.title || '未知歌曲'}</div>
                        <button class="copy-btn" data-type="title">📋</button>
                    </div>`;
                    
                    const artistHtml = hasValidArtist 
                        ? `<div class="copy-wrapper">
                            <span class="song-artist-inline">
                                <span class="artist-tag">歌手</span>${item.artist}
                            </span>
                            <button class="copy-btn" data-type="artist">📋</button>
                          </div>` 
                        : '';

                    const collectionHtml = `<div class="copy-wrapper">
                        <span class="collection-text">合集：${item.collection || '未知'}</span>
                        <button class="copy-btn" data-type="collection">📋</button>
                    </div>`;

                    const linkHtml = isLinkValid 
                        ? `<div class="song-link">
                            <a href="${item.link}" target="_blank">直达B站</a>
                            <button class="copy-btn link-copy-btn" data-type="link">📋</button>
                          </div>` 
                        : '';

                    const editHtml = bvid 
                        ? `<a href="https://member.bilibili.com/platform/upload/video/frame/?type=edit&version=new&bvid=${bvid}" target="_blank" class="edit-link">✏️</a>`
                        : '';

                    const li = document.createElement('li');
                    li.className = `song-item ${hasValidArtist ? '' : 'missing-artist'}`;
                    li.innerHTML = `
                        <div class="song-info">
                            <div class="song-title-row">
                                ${titleHtml}
                                ${artistHtml}
                            </div>
                            <div class="song-meta">
                                ${collectionHtml}
                            </div>
                            <div class="song-source">来源：${sourceAlias}</div>
                        </div>
                        <div class="song-actions">
                            ${linkHtml}
                            ${editHtml}
                        </div>
                    `;
                    
                    const titleCopyBtn = li.querySelector('[data-type="title"]');
                    if (titleCopyBtn) {
                        const title = item.title || '未知歌曲';
                        const artist = item.artist?.trim();
                        const copyText = hasValidArtist ? `${title} - ${artist}` : title;
                        titleCopyBtn.onclick = () => copyToClipboard(copyText);
                    }
                    
                    const artistCopyBtn = li.querySelector('[data-type="artist"]');
                    if (artistCopyBtn) {
                        artistCopyBtn.onclick = () => copyToClipboard(item.artist);
                    }
                    
                    const collectionCopyBtn = li.querySelector('[data-type="collection"]');
                    if (collectionCopyBtn) {
                        collectionCopyBtn.onclick = () => copyToClipboard(item.collection || '未知');
                    }
                    
                    const linkCopyBtn = li.querySelector('[data-type="link"]');
                    if (linkCopyBtn) {
                        linkCopyBtn.onclick = () => copyToClipboard(item.link);
                    }
                    
                    songListEl.appendChild(li);
                });
            }

            renderPagination(data.length);
        }

        function renderPagination(total) {
            const paginationEl = document.getElementById('pagination');
            paginationEl.innerHTML = '';

            const totalPages = Math.ceil(total / PAGE_SIZE);
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = `page-btn ${currentPage === 1 ? 'disabled' : ''}`;
            prevBtn.textContent = '上一页';
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderSongList(filteredBySearch);
                }
            };
            paginationEl.appendChild(prevBtn);

            if (currentPage > 3) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'page-btn';
                firstBtn.textContent = '1';
                firstBtn.onclick = () => {
                    currentPage = 1;
                    renderSongList(filteredBySearch);
                };
                paginationEl.appendChild(firstBtn);

                if (currentPage > 4) {
                    const ellipsis = document.createElement('button');
                    ellipsis.className = 'page-btn ellipsis';
                    ellipsis.textContent = '...';
                    ellipsis.disabled = true;
                    paginationEl.appendChild(ellipsis);
                }
            }

            const startPage = Math.max(1, currentPage - 4);
            const endPage = Math.min(totalPages, currentPage + 4);
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderSongList(filteredBySearch);
                };
                paginationEl.appendChild(pageBtn);
            }

            if (currentPage < totalPages - 3) {
                if (currentPage < totalPages - 4) {
                    const ellipsis = document.createElement('button');
                    ellipsis.className = 'page-btn ellipsis';
                    ellipsis.textContent = '...';
                    ellipsis.disabled = true;
                    paginationEl.appendChild(ellipsis);
                }

                const lastBtn = document.createElement('button');
                lastBtn.className = 'page-btn';
                lastBtn.textContent = totalPages;
                lastBtn.onclick = () => {
                    currentPage = totalPages;
                    renderSongList(filteredBySearch);
                };
                paginationEl.appendChild(lastBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = `page-btn ${currentPage === totalPages ? 'disabled' : ''}`;
            nextBtn.textContent = '下一页';
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderSongList(filteredBySearch);
                }
            };
            paginationEl.appendChild(nextBtn);

            const jumpContainer = document.createElement('div');
            jumpContainer.className = 'page-jump-container';
            jumpContainer.innerHTML = `
                <span class="page-jump-text">共 ${totalPages} 页，跳至</span>
                <input type="number" class="page-jump-input" min="1" max="${totalPages}" value="${currentPage}">
                <span class="page-jump-text">页</span>
                <button class="page-btn" id="jump-btn">跳转</button>
            `;
            paginationEl.appendChild(jumpContainer);

            const jumpInput = jumpContainer.querySelector('.page-jump-input');
            const jumpBtn = jumpContainer.querySelector('#jump-btn');

            jumpBtn.onclick = () => {
                let targetPage = parseInt(jumpInput.value);
                if (isNaN(targetPage)) targetPage = 1;
                targetPage = Math.max(1, Math.min(totalPages, targetPage));
                if (targetPage !== currentPage) {
                    currentPage = targetPage;
                    renderSongList(filteredBySearch);
                }
            };

            jumpInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.keyCode === 13) {
                    jumpBtn.click();
                }
            });

            jumpInput.addEventListener('input', () => {
                jumpInput.value = jumpInput.value.replace(/\D/g, '');
            });
        }

        function initSearchFieldCheckboxes() {
            const checkboxes = [
                document.getElementById('search-title'),
                document.getElementById('search-artist'),
                document.getElementById('search-collection'),
                document.getElementById('search-source')
            ];
            
            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    currentPage = 1;
                    updateFilterAndSearch();
                });
            });
        }

        function initSearch() {
            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.keyCode === 13) {
                    e.preventDefault();
                    currentPage = 1;
                    updateFilterAndSearch();
                }
            });

            searchBtn.addEventListener('click', () => {
                currentPage = 1;
                updateFilterAndSearch();
            });

            let searchTimer = null;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    currentPage = 1;
                    updateFilterAndSearch();
                }, 300);
            });
        }

        async function bootstrap() {
            try {
                const res = await fetch('data/index.json');
                if (!res.ok) throw new Error(`加载索引失败（状态码：${res.status}`);
                const config = await res.json();
                fileNames.push(...(config.files || []));
                FILE_TO_ALIAS = config.fileToAlias || {};

                if (fileNames.length === 0) throw new Error('index.json中无数据文件配置');

                const progressMsg = document.getElementById('progress-msg');
                progressMsg.textContent = `📥 正在并行加载 ${fileNames.length} 个歌库文件...`;

                await loadScriptsParallel(fileNames);

                progressMsg.textContent = `✅ 歌库加载完成，总歌曲数：${originalData.length}`;
                filteredBySource = [...originalData];
                filteredBySearch = [...originalData];

                generateFilterButtons();
                initSearchFieldCheckboxes();
                initSearch();
                document.getElementById('copy-all-btn').addEventListener('click', copyAllSearchResults);
                
                updateStats();
                renderSongList(filteredBySearch);

            } catch (error) {
                console.error('❌ 启动失败：', error);
                const progressMsg = document.getElementById('progress-msg');
                progressMsg.className = 'progress-msg error-msg';
                progressMsg.textContent = `❌ 加载失败：${error.message}`;
            }
        }

        document.addEventListener('DOMContentLoaded', bootstrap);
    </script>
</body>
