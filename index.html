<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歌曲搜索</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f9fafb;
      --text: #111827;
      --muted: #667085;
      --line: #d9e0ea;
      --line-strong: #b8c2d2;
      --primary: #0f766e;
      --primary-soft: #e6f4f1;
      --accent: #1d4ed8;
      --danger: #b42318;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      --sidebar: 280px;
    }

    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      max-width: 100%;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 18px;
      background: #ffffff;
      border-right: 1px solid var(--line);
    }

    .brand {
      display: block;
      margin-bottom: 18px;
    }

    .brand-mark {
      display: none;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .brand-subtitle {
      display: none;
    }

    .nav {
      display: grid;
      gap: 6px;
      margin: 14px 0 20px;
    }

    .nav a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 34px;
      padding: 7px 9px;
      border-radius: 8px;
      color: #334155;
      text-decoration: none;
    }

    .nav a:hover,
    .nav a.active {
      color: var(--primary);
      background: var(--primary-soft);
    }

    .panel-title {
      margin: 18px 0 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }

    .source-search {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    .source-search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .source-list {
      margin-top: 8px;
      display: grid;
      gap: 4px;
      max-height: calc(100vh - 270px);
      overflow: auto;
      padding-right: 2px;
    }

    .source-item {
      width: 100%;
      min-height: 38px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px 8px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #334155;
      text-align: left;
    }

    .source-item:hover {
      background: #f1f5f9;
    }

    .source-item.active {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .source-avatar {
      position: relative;
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      overflow: hidden;
      border-radius: 50%;
      background: var(--source-avatar-color, var(--primary));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    .source-avatar-fallback {
      position: relative;
      z-index: 1;
    }

    .source-avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .all-source-avatar {
      width: 34px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 0;
    }

    .source-item span:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(245, 247, 251, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 16px 22px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px 126px;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      outline: none;
      color: var(--text);
      font-size: 15px;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .select,
    .btn {
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 700;
      text-decoration: none;
    }

    .btn:hover {
      border-color: var(--line-strong);
      background: #f8fafc;
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .btn.primary:hover {
      background: #0b625c;
    }

    .toolbar {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .home-last-run {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .segmented,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .segment,
    .chip {
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-weight: 600;
    }

    .segment.active,
    .chip.active {
      color: var(--primary);
      border-color: #99d5cd;
      background: var(--primary-soft);
    }

    .content {
      padding: 18px 22px 32px;
      min-width: 0;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0 10px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .status.error {
      color: var(--danger);
    }

    .result-list {
      display: grid;
      gap: 8px;
    }

    .song-row {
      display: grid;
      grid-template-columns: 108px minmax(220px, 1.35fr) minmax(150px, 0.85fr) minmax(200px, 1fr) 142px auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.02);
    }

    .song-row > * {
      min-width: 0;
    }

    .song-row:not(.has-cover) {
      grid-template-columns: minmax(220px, 1.35fr) minmax(150px, 0.85fr) minmax(200px, 1fr) 142px auto;
    }

    .song-title {
      font-weight: 800;
      line-height: 1.35;
      word-break: break-word;
      min-width: 0;
    }

    .song-title-line {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
    }

    .song-artist,
    .song-collection,
    .song-source {
      color: #475569;
      line-height: 1.4;
      word-break: break-word;
      min-width: 0;
      overflow: hidden;
    }

    .song-source {
      font-weight: 600;
      color: #64748b;
    }

    .song-cover {
      width: 108px;
      aspect-ratio: 16 / 9;
      display: block;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #eef2f7;
      text-decoration: none;
    }

    .song-cover img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .song-media {
      min-width: 0;
    }

    .media-lazy {
      background: #e8edf3;
    }

    .media-lazy.media-loaded {
      background: transparent;
    }

    .media-lazy.media-failed {
      display: none;
    }

    .song-main {
      min-width: 0;
    }

    .song-artist {
      color: #1f3f46;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mobile-card-meta {
      display: none;
      min-width: 0;
    }

    .mobile-meta-source,
    .mobile-meta-chip {
      display: block;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      align-items: center;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      display: inline-grid;
      place-items: center;
      text-decoration: none;
    }

    .icon-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-soft);
    }

    .icon-btn svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .pagination .btn {
      height: 36px;
      min-width: 74px;
    }

    .pagination .page-number-btn {
      min-width: 36px;
      padding-inline: 10px;
    }

    .pagination .page-number-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .pagination .page-ellipsis {
      color: var(--muted);
      font-weight: 800;
      padding: 0 2px;
    }

    .page-label {
      color: var(--muted);
      font-weight: 700;
      min-width: 140px;
      text-align: center;
    }

    .copy-panel {
      margin-top: 14px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
    }

    .copy-toolbar {
      display: grid;
      grid-template-columns: auto minmax(220px, 360px) auto auto;
      gap: 8px;
      align-items: center;
    }

    .copy-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .copy-action-select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
    }

    .copy-action-btn,
    .copy-field-toggle {
      height: 38px;
      padding: 0 14px;
    }

    .copy-field-toggle[aria-expanded="true"] {
      color: var(--primary);
      border-color: #99d5cd;
      background: var(--primary-soft);
    }

    .copy-custom {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid #eef2f6;
    }

    .copy-custom.open {
      display: flex;
    }

    .copy-separator,
    .copy-format {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
    }

    .copy-separator {
      width: 92px;
    }

    .check-chip {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 30px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      color: #334155;
      font-weight: 600;
    }

    .field-copy {
      max-width: 100%;
      min-width: 0;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 1px 3px;
      margin: -1px -3px;
      border-radius: 6px;
      font: inherit;
      line-height: inherit;
      text-align: left;
      word-break: inherit;
    }

    .song-title .field-copy {
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .song-artist .field-copy,
    .song-collection .field-copy,
    .song-source .field-copy {
      width: 100%;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-copy:hover,
    .field-copy:focus-visible {
      color: var(--primary);
      background: var(--primary-soft);
      outline: none;
    }

    .field-copy:focus-visible {
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .song-title .field-copy {
      font-weight: 800;
    }

    .unique-song-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border: 1px solid #d8e2ee;
      border-radius: 999px;
      background: #f8fafc;
      color: #7a5a16;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
    }

    .meta .field-copy {
      min-height: 32px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 3px;
      margin: 0 -3px;
    }

    .meta-separator {
      color: var(--muted);
    }

    .empty {
      padding: 36px 16px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 80;
      padding: 10px 12px;
      border-radius: 8px;
      color: #fff;
      background: #111827;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-source {
      display: none;
    }

    .mobile-brandbar,
    .mobile-filter-chips,
    .mobile-data-summary,
    .mobile-copy-open,
    .mobile-sheet-backdrop,
    .action-label {
      display: none;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .mobile-sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 120;
      background: rgba(15, 23, 42, 0.42);
    }

    .mobile-sheet-backdrop.open {
      display: block;
    }

    .mobile-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 130;
      display: none;
      max-height: min(78vh, 680px);
      overflow: hidden;
      border-radius: 16px 16px 0 0;
      background: #fff;
      box-shadow: 0 -18px 48px rgba(15, 23, 42, 0.22);
    }

    .mobile-sheet.open {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .mobile-sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .mobile-sheet-title {
      font-weight: 800;
      font-size: 16px;
    }

    .mobile-sheet-close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-weight: 800;
    }

    .mobile-sheet-body {
      min-height: 0;
      overflow: auto;
      padding: 14px 16px 18px;
    }

    .mobile-sheet-section {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mobile-sheet-section:last-child {
      margin-bottom: 0;
    }

    .mobile-sheet-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .mobile-option-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mobile-option-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .mobile-option-grid.auto {
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
    }

    .mobile-option {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-weight: 700;
    }

    .mobile-option.active {
      border-color: #99d5cd;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .mobile-source-options {
      display: grid;
      gap: 6px;
      max-height: 260px;
      overflow: auto;
    }

    .mobile-source-option {
      min-height: 40px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 10px;
      color: #334155;
      text-align: left;
    }

    .mobile-source-option.active {
      border-color: #99d5cd;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 800;
    }

    .mobile-source-option span:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mobile-copy-list {
      display: grid;
      gap: 8px;
    }

    .mobile-copy-list .btn {
      justify-content: flex-start;
      width: 100%;
      height: 42px;
      padding: 0 12px;
    }

    .mobile-custom-copy {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #eef2f6;
    }

    /* desktop >= 981px: reuse the H5 card rhythm, but let result cards auto-fill columns. */
    @media (min-width: 981px) {
      .content {
        padding: 16px 18px 28px;
      }

      .toolbar,
      .copy-panel,
      .metrics {
        margin-bottom: 10px;
      }

      .metrics {
        grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
        gap: 8px;
      }

      .metric {
        padding: 10px 12px;
      }

      .metric-value {
        font-size: 18px;
      }

      .results-header {
        margin: 10px 0 8px;
      }

      .result-list {
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        align-items: start;
        gap: 10px;
      }

      .song-row {
        grid-template-columns: 104px minmax(0, 1fr);
        grid-template-areas:
          "cover main"
          "cover artist"
          "cover collection"
          "cover actions";
        gap: 5px 10px;
        align-items: start;
        min-width: 0;
        padding: 9px 10px;
      }

      .song-row:not(.has-cover) {
        grid-template-columns: minmax(0, 1fr);
        grid-template-areas:
          "main"
          "artist"
          "collection"
          "actions";
      }

      .song-media {
        grid-area: cover;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        align-self: start;
      }

      .song-cover {
        width: 104px;
        max-width: 100%;
        align-self: start;
        border-radius: 8px;
      }

      .song-main {
        grid-area: main;
        min-width: 0;
      }

      .song-title {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        font-size: 15px;
        line-height: 1.3;
      }

      .song-row .meta {
        display: none;
      }

      .mobile-card-meta {
        display: flex;
        align-items: center;

  <script>
    const API_BASE = location.protocol === 'file:' ? 'https://www.culua.com' : '';
    const state = {
      q: '',
      source: 'all',
      sort: 'pubdate_desc',
      page: 1,
      pageSize: 40,
      fields: new Set(['title', 'artist']),
      files: [],
      aliases: {},
      profiles: {},
      stats: {},
      items: [],
      total: 0,
      totalPages: 1,
      summary: {},
      controller: null,
      lastRequest: 0
    };
    const STORAGE_KEYS = {
      filters: 'culua-home-filters-v1',
      copy: 'culua-home-copy-v1'
    };

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));
    const LAZY_IMAGE_PLACEHOLDER = 'data:image/gif;base64,R0lGODlhAQABAAAAACw=';
    let lazyImageObserver = null;
    let artistFitFrame = 0;
    let artistResizeTimer = 0;

    function formatNumber(value) {
      return new Intl.NumberFormat('zh-CN').format(Number(value || 0));
    }

    function sourceKey(file) {
      return String(file || '').replace(/\.js$/, '');
    }

    function isCombinedSource(file) {
      return sourceKey(file) === 'others' || sourceName(file) === '非常驻妹妹';
    }

    function sourceName(file) {
      if (file === 'all') return '全部来源';
      return state.aliases[sourceKey(file)] || file || '未知来源';
    }

    function defaultAvatarText(name) {
      const picked = Array.from(String(name || '').trim()).find(ch => /[\p{Script=Han}\p{Script=Hiragana}\p{Script=Katakana}A-Za-z0-9]/u.test(ch));
      return (picked || '源').toUpperCase();
    }

    function sourceProfile(file) {
      const name = sourceName(file);
      if (file === 'all') {
        return { alias: name, avatarText: 'ALL', avatarUrl: '', youtubeUrl: '', accentColor: '#0f766e' };
      }
      const profile = state.profiles[sourceKey(file)] || {};
      return {
        alias: name,
        avatarText: profile.avatarText || defaultAvatarText(name),
        avatarUrl: profile.avatarUrl || '',
        youtubeUrl: profile.youtubeUrl || '',
        accentColor: profile.accentColor || '#0f766e'
      };
    }

    function sourceAvatar(file, extraClass = '') {
      const profile = sourceProfile(file);
      const classes = ['source-avatar', file === 'all' ? 'all-source-avatar' : '', extraClass].filter(Boolean).join(' ');
      const style = profile.accentColor ? ` style="--source-avatar-color:${escapeHtml(profile.accentColor)}"` : '';
      if (profile.avatarUrl) {
        return `<span class="${classes}"${style}><img ${lazyImageAttributes(profile.avatarUrl)}></span>`;
      }
      return `<span class="${classes}"${style}>${escapeHtml(profile.avatarText)}</span>`;
    }

    function normalizeMediaUrl(value) {
      const text = String(value || '').trim();
      if (text.startsWith('//')) return `https:${text}`;
      if (/^http:\/\//i.test(text)) return text.replace(/^http:\/\//i, 'https://');
      return text;
    }

    function coverUrl(item) {
      return buildDisplayThumbUrl(item?.cover || item?.thumbnail || item?.coverThumb || '', 160);
    }

    function buildDisplayThumbUrl(value, width = 160) {
      const text = normalizeMediaUrl(value);
      if (!text || !/\.hdslb\.com\//i.test(text)) return text;
      const height = Math.max(1, Math.round(width * 9 / 16));
      const targetSuffix = `@${width}w_${height}h_1c.webp`;
      const match = text.match(/^([^?#]+)([?#].*)?$/);
      if (!match) return text;
      const path = match[1];
      const query = match[2] || '';
      if (!/\.(?:jpe?g|png|webp)(?:@[^/?#]+)?$/i.test(path)) return text;
      return path.replace(/(\.(?:jpe?g|png|webp))(?:@[^/?#]+)?$/i, `$1${targetSuffix}`) + query;
    }

    function lazyImageAttributes(url, className = '') {
      const classes = ['media-lazy', className].filter(Boolean).join(' ');
      return `class="${escapeHtml(classes)}" src="${LAZY_IMAGE_PLACEHOLDER}" data-src="${escapeHtml(url)}" alt="" loading="lazy" decoding="async" fetchpriority="low" referrerpolicy="no-referrer"`;
    }

    function loadLazyImage(img) {
      const src = img?.dataset?.src || '';
      if (!src || img.dataset.lazyLoaded === '1') return;
      img.dataset.lazyLoaded = '1';
      img.addEventListener('load', () => img.classList.add('media-loaded'), { once: true });
      img.addEventListener('error', () => {
        img.classList.add('media-failed');
        img.removeAttribute('src');
      }, { once: true });
      img.src = src;
    }

    function initLazyMedia(root = document) {
      const images = Array.from(root.querySelectorAll('img.media-lazy[data-src]'))
        .filter(img => img.dataset.lazyLoaded !== '1' && img.dataset.lazyObserved !== '1');
      if (!images.length) return;
      if (!('IntersectionObserver' in window)) {
        images.forEach(loadLazyImage);
        return;
      }
      if (!lazyImageObserver) {
        lazyImageObserver = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            lazyImageObserver.unobserve(entry.target);
            loadLazyImage(entry.target);
          });
        }, { rootMargin: '320px 0px', threshold: 0.01 });
      }
      images.forEach(img => {
        img.dataset.lazyObserved = '1';
        lazyImageObserver.observe(img);
      });
    }

    function sourceCount(file) {
      if (file === 'all') return Number(state.summary.totalSongs || state.stats.totalSongs || 0);
      const stat = state.stats[file] || state.stats[sourceKey(file)] || {};
      return Number(stat.totalSongs || stat.count || stat.total || 0);
    }

    function compareSourcesByCount(a, b) {
      const combinedA = isCombinedSource(a);
      const combinedB = isCombinedSource(b);
      if (combinedA !== combinedB) return combinedA ? 1 : -1;
      const countDiff = sourceCount(b) - sourceCount(a);
      if (countDiff) return countDiff;
      return sourceName(a).localeCompare(sourceName(b), 'zh-Hans');
    }

    function isValidArtist(value) {
      const text = String(value || '').trim();
      return text && text !== '来源处未提供标准格式歌手' && text !== '未知';
    }

    function extractBv(item) {
      return item.bvid || String(item.link || '').match(/BV[0-9A-Za-z]+/)?.[0] || '';
    }

    function formatDate(ts) {
      const value = Number(ts || 0);
      if (!value) return '';
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(new Date(value * 1000));
    }

    function formatDateTime(ts) {
      const value = Number(ts || 0);
      if (!value) return '';
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).format(new Date(value * 1000));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function encodeCopyText(value) {
      return encodeURIComponent(String(value ?? ''));
    }

    function copyableField(value, label, className = '') {
      const text = String(value ?? '');
      const display = text.trim() || '-';
      return `<button type="button" class="field-copy ${className}" data-copy-value="${escapeHtml(encodeCopyText(text))}" title="复制${escapeHtml(label)}：${escapeHtml(display)}" aria-label="复制${escapeHtml(label)}">${escapeHtml(display)}</button>`;
    }

    function iconSvg(name) {
      const icons = {
        copy: '<rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>',
        link: '<path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"></path><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"></path>',
        external: '<path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"></path>',
        edit: '<path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>'
      };
      return `<svg viewBox="0 0 24 24" aria-hidden="true">${icons[name] || icons.copy}</svg>`;
    }

    function editUrlFromBv(bv) {
      return bv ? `https://member.bilibili.com/platform/upload/video/frame/?type=edit&version=new&bvid=${encodeURIComponent(bv)}` : '';
    }

    function setStatus(text, error = false) {
      const el = $('#status');
      el.textContent = text;
      el.classList.toggle('error', error);
    }

    function artistChipOverflows(chip) {
      return !!chip && chip.scrollWidth > chip.clientWidth + 1;
    }

    function resetArtistChipFit(chip) {
      if (!chip) return;
      chip.style.fontSize = '';
      chip.style.paddingLeft = '';
      chip.style.paddingRight = '';
      chip.dataset.fitStage = '';
      chip.dataset.fitFontSize = '';
      chip.dataset.fitPadding = '';
    }

    function fitArtistChip(chip) {
      if (!chip) return;
      resetArtistChipFit(chip);
      const computed = window.getComputedStyle(chip);
      let fontSize = parseFloat(computed.fontSize) || 13;
      let paddingLeft = parseFloat(computed.paddingLeft) || 7;
      let paddingRight = parseFloat(computed.paddingRight) || paddingLeft;
      const viewportWidth = Math.max(window.innerWidth || 0, document.documentElement?.clientWidth || 0);
      const minPadding = viewportWidth <= 360 ? 3 : 4;
      const minFontSize = viewportWidth <= 360 ? 10 : 11;
      let stage = 'full';

      if (!artistChipOverflows(chip)) {
        chip.dataset.fitStage = stage;
        chip.dataset.fitFontSize = fontSize.toFixed(1);
        chip.dataset.fitPadding = Math.max(paddingLeft, paddingRight).toFixed(1);
        return;
      }

      while (artistChipOverflows(chip) && (paddingLeft > minPadding || paddingRight > minPadding)) {
        paddingLeft = Math.max(minPadding, paddingLeft - 1);
        paddingRight = Math.max(minPadding, paddingRight - 1);
        chip.style.paddingLeft = `${paddingLeft}px`;
        chip.style.paddingRight = `${paddingRight}px`;
        stage = 'compact-padding';
      }

      while (artistChipOverflows(chip) && fontSize > minFontSize + 0.001) {
        fontSize = Math.max(minFontSize, Math.round((fontSize - 0.5) * 10) / 10);
        chip.style.fontSize = `${fontSize}px`;
        stage = 'compact-font';
      }

      chip.dataset.fitStage = artistChipOverflows(chip) ? 'truncated' : stage;
      chip.dataset.fitFontSize = fontSize.toFixed(1);
      chip.dataset.fitPadding = Math.max(paddingLeft, paddingRight).toFixed(1);
    }

    function fitArtistChips(root = document) {
      Array.from(root.querySelectorAll('.song-artist .field-copy')).forEach(fitArtistChip);
    }

    function scheduleArtistChipFit(root = document) {
      if (artistFitFrame) cancelAnimationFrame(artistFitFrame);
      artistFitFrame = requestAnimationFrame(() => {
        artistFitFrame = 0;
        fitArtistChips(root);
      });
    }

    function showToast(text) {
      const toast = $('#toast');
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function sortLabel(value = state.sort) {
      return {
        pubdate_desc: '新到旧',
        pubdate_asc: '旧到新',
        original: '原始顺序'
      }[value] || '新到旧';
    }

    function activeFieldsLabel() {
      const labels = {
        title: '歌名',
        artist: '歌手',
        collection: '合集',
        source: '来源',
        bvid: 'BV',
        pubdate: '日期'
      };
      const fields = Array.from(state.fields).map(field => labels[field] || field);
      if (fields.length <= 2) return fields.join('/');
      return `${fields.slice(0, 2).join('/')} +${fields.length - 2}`;
    }

    function readJsonStorage(key) {
      try {
        localStorage.removeItem(key);
      } catch (err) {}
      return {};
    }

    function writeJsonStorage(key, value) {
      // Filter and copy controls are session-only; refresh returns to the default layout.
    }

    function clearLegacyHomeStorage() {
      Object.values(STORAGE_KEYS).forEach(key => {
        try {
          localStorage.removeItem(key);
        } catch (err) {}
      });
    }

    function syncFieldChips() {
      $$('#fieldChips [data-field]').forEach(item => item.classList.toggle('active', state.fields.has(item.dataset.field)));
      $$('#mobileFieldChips [data-mobile-field]').forEach(item => item.classList.toggle('active', state.fields.has(item.dataset.mobileField)));
      renderMobileControls();
    }

    function syncPageSizeSegments() {
      $$('.segment').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.pageSize) === state.pageSize));
      $$('[data-mobile-page-size]').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.mobilePageSize) === state.pageSize));
      renderMobileControls();
    }

    function saveHomeFilters() {
      writeJsonStorage(STORAGE_KEYS.filters, {
        sort: state.sort,
        pageSize: state.pageSize,
        fields: Array.from(state.fields)
      });
    }

    function restoreHomeFilters(params) {
      const saved = readJsonStorage(STORAGE_KEYS.filters);
      if (!params.has('sort') && typeof saved.sort === 'string') {
        state.sort = ['pubdate_desc', 'pubdate_asc'].includes(saved.sort) ? saved.sort : 'pubdate_desc';
      }
      if (!params.has('pageSize') && saved.pageSize) {
        state.pageSize = Math.max(20, Math.min(80, Number(saved.pageSize || 40)));
      }
      if (Array.isArray(saved.fields) && saved.fields.length > 0) {
        const nextFields = saved.fields.filter(field => ['title', 'artist', 'collection', 'source', 'bvid', 'pubdate'].includes(field));
        if (nextFields.length) state.fields = new Set(nextFields);
      }
    }

    function saveCopySettings() {
      const customCopy = $('#customCopy');
      writeJsonStorage(STORAGE_KEYS.copy, {
        fields: getCopyFields(),
        validOnly: !!$('[data-copy-valid]')?.checked,
        separator: getCopySeparator(),
        format: getCopyFormat(),
        action: $('#copyAction')?.value || 'titleArtist',
        customOpen: !!customCopy?.classList.contains('open')
      });
    }

    function restoreCopySettings() {
      const saved = readJsonStorage(STORAGE_KEYS.copy);
      if (Array.isArray(saved.fields) && saved.fields.length > 0) {
        const fieldSet = new Set(saved.fields);
        $$('[data-copy-field]').forEach(input => {
          input.checked = fieldSet.has(input.dataset.copyField);
        });
      }
      const validInput = $('[data-copy-valid]');
      if (validInput && typeof saved.validOnly === 'boolean') {
        validInput.checked = saved.validOnly;
      }
      const separator = $('#copySeparator');
      if (separator && typeof saved.separator === 'string') {
        separator.value = saved.separator || ' ';
      }
      const format = $('#copyFormat');
      if (format && (saved.format === 'text' || saved.format === 'tsv')) {
        format.value = saved.format;
      }
      const action = $('#copyAction');
      if (action && ['titleArtist', 'titleArtistLink', 'tsv', 'all', 'custom'].includes(saved.action)) {
        action.value = saved.action;
      }
      const customCopy = $('#customCopy');
      const toggle = $('#toggleCustomCopy');
      if (customCopy && toggle && saved.customOpen) {
        setCustomCopyOpen(true, { persist: false });
      }
      syncMobileCopyFromDesktop();
    }

    function syncMobileCopyFromDesktop() {
      const desktopFields = new Set($$('[data-copy-field]').filter(input => input.checked).map(input => input.dataset.copyField));
      $$('[data-mobile-copy-field]').forEach(btn => {
        btn.classList.toggle('active', desktopFields.has(btn.dataset.mobileCopyField));
      });
      const valid = !!$('[data-copy-valid]')?.checked;
      const validBtn = $('#mobileCopyValidOnly');
      if (validBtn) {
        validBtn.classList.toggle('active', valid);
        validBtn.setAttribute('aria-pressed', valid ? 'true' : 'false');
      }
      const format = getCopyFormat();
      const formatBtn = $('#mobileCopyFormat');
      if (formatBtn) {
        formatBtn.dataset.format = format;
        formatBtn.textContent = format === 'tsv' ? 'TSV' : '纯文本';
        formatBtn.classList.toggle('active', format === 'tsv');
      }
      const mobileSeparator = $('#mobileCopySeparator');
      if (mobileSeparator) mobileSeparator.value = getCopySeparator();
    }

    function buildSourceOptions(filter = '') {
      const needle = filter.trim().toLowerCase();
      const entries = ['all'].concat(state.files.slice().sort(compareSourcesByCount));
      return entries.filter(file => {
        const label = `${sourceName(file)} ${file}`.toLowerCase();
        return !needle || label.includes(needle);
      });
    }

    function renderSources(filter = '') {
      const list = $('#sourceList');
      const mobile = $('#sourceMobile');
      const mobileOptions = $('#mobileSourceOptions');
      const entries = buildSourceOptions(filter);
      const allSources = ['all'].concat(state.files.slice().sort(compareSourcesByCount));
      list.innerHTML = entries.map(file => `
        <button class="source-item ${state.source === file ? 'active' : ''}" data-source="${escapeHtml(file)}">
          ${sourceAvatar(file)}
          <span>${escapeHtml(sourceName(file))}</span>
          <span class="source-count">${formatNumber(sourceCount(file))}</span>
        </button>
      `).join('');
      mobile.innerHTML = allSources.map(file => `
        <option value="${escapeHtml(file)}">${escapeHtml(sourceName(file))} (${formatNumber(sourceCount(file))})</option>
      `).join('');
      mobile.value = state.source;
      if (mobileOptions) {
        mobileOptions.innerHTML = entries.map(file => `
          <button class="mobile-source-option ${state.source === file ? 'active' : ''}" type="button" data-mobile-source="${escapeHtml(file)}">
            ${sourceAvatar(file)}
            <span>${escapeHtml(sourceName(file))}</span>
            <span class="source-count">${formatNumber(sourceCount(file))}</span>
          </button>
        `).join('');
      }
      initLazyMedia(list);
      if (mobileOptions) initLazyMedia(mobileOptions);
      renderMobileControls();
    }

    function renderMetrics() {
      const summary = state.summary || {};
      $('#metricTotal').textContent = formatNumber(summary.totalSongs || 0);
      $('#metricSource').textContent = sourceName(state.source);
      $('#metricResult').textContent = formatNumber(state.total || 0);
      $('#metricUnique').textContent = formatNumber(summary.searchUnique || summary.filteredBySourceUnique || 0);
      renderMobileSummary();
      renderMobileControls();
    }

    function renderMobileSummary() {
      const summary = state.summary || {};
      const total = formatNumber(summary.filteredBySourceCount || summary.totalSongs || state.total || 0);
      const unique = formatNumber(summary.searchUnique || summary.filteredBySourceUnique || 0);
      const result = state.total ? ` · 匹配 ${formatNumber(state.total)}` : '';
      const el = $('#mobileDataSummary');
      if (el) el.textContent = `${sourceName(state.source)} · ${total} 条 · 去重 ${unique}${result}`;
    }

    function renderMobileControls() {
      const sourceChip = $('#mobileSourceChip');
      const sortChip = $('#mobileSortChip');
      const fieldsChip = $('#mobileFieldsChip');
      const pageChip = $('#mobilePageSizeChip');
      const sortSelect = $('#mobileSortSelect');
      if (sourceChip) sourceChip.textContent = sourceName(state.source);
      if (sortChip) sortChip.textContent = sortLabel();
      if (fieldsChip) fieldsChip.textContent = activeFieldsLabel();
      if (pageChip) pageChip.textContent = `${state.pageSize} 条`;
      if (sortSelect) sortSelect.value = state.sort;
    }

    function renderResults() {
      const results = $('#results');
      if (!state.items.length) {
        results.innerHTML = '<div class="empty">没有匹配结果</div>';
        return;
      }
      results.innerHTML = state.items.map(item => {
        const artist = isValidArtist(item.artist) ? item.artist : '无歌手信息';
        const src = sourceName(item.source);
        const bv = extractBv(item);
        const date = formatDate(item.pubdate);
        const metaParts = [
          copyableField(bv, 'BV号', 'meta-copy'),
          date ? `<span class="meta-separator">·</span> ${copyableField(date, '发布日期', 'meta-copy')}` : ''
        ].filter(Boolean).join(' ');
        const editHref = editUrlFromBv(bv);
        const cover = coverUrl(item);
        const uniqueBadge = item.isUniqueSong
          ? '<span class="unique-song-badge" title="独特歌曲：按歌名 - 歌手宽容去重后仅单来源收录">★ 独特</span>'
          : '';
        const mobileMeta = [
          sourceAvatar(item.source, 'mobile-meta-avatar'),
          `<span class="mobile-meta-source" title="${escapeHtml(src)}">${escapeHtml(src)}</span>`,
          date ? `<span class="mobile-meta-chip" title="${escapeHtml(date)}">${escapeHtml(date)}</span>` : '',
          bv ? `<span class="mobile-meta-chip" title="${escapeHtml(bv)}">${escapeHtml(bv)}</span>` : ''
        ].filter(Boolean).join('');
        return `
          <article class="song-row ${cover ? 'has-cover' : ''}">
            ${cover ? `<div class="song-media"><a class="song-cover" href="${escapeHtml(item.link || '#')}" target="_blank" rel="noreferrer"><img ${lazyImageAttributes(cover)}></a><div class="mobile-card-meta">${mobileMeta}</div></div>` : ''}
            <div class="song-main">
              <div class="song-title-line"><div class="song-title">${copyableField(item.title || '未知歌曲', '歌名', 'song-title-copy')}</div>${uniqueBadge}</div>
              <div class="meta">${metaParts}</div>
              ${cover ? '' : `<div class="mobile-card-meta">${mobileMeta}</div>`}
            </div>
            <div class="song-artist">${copyableField(artist, '歌手')}</div>
            <div class="song-collection">${copyableField(item.collection || '未知合集', '合集')}</div>
            <div class="song-source">${copyableField(src, '来源')}</div>
            <div class="row-actions">
              <button class="icon-btn" type="button" title="复制歌名 - 歌手" aria-label="复制歌名 - 歌手" data-row-copy="titleArtist" data-row-id="${escapeHtml(item.rowId || '')}">${iconSvg('copy')}<span class="action-label">复制</span></button>
              ${editHref ? `<a class="icon-btn" title="编辑稿件" aria-label="编辑稿件" href="${escapeHtml(editHref)}" target="_blank" rel="noreferrer">${iconSvg('edit')}<span class="action-label">编辑</span></a>` : ''}
              <button class="icon-btn" type="button" title="复制链接" aria-label="复制链接" data-row-copy="link" data-row-id="${escapeHtml(item.rowId || '')}">${iconSvg('link')}<span class="action-label">链接</span></button>
              <a class="icon-btn" title="打开B站" aria-label="打开B站" href="${escapeHtml(item.link || '#')}" target="_blank" rel="noreferrer">${iconSvg('external')}<span class="action-label">打开</span></a>
            </div>
          </article>
        `;
      }).join('');
      initLazyMedia(results);
      scheduleArtistChipFit(results);
    }

    function renderPagination() {
      const el = $('#pagination');
      const page = Number(state.page || 1);
      const totalPages = Math.max(1, Number(state.totalPages || 1));
      const pages = buildPageWindow(page, totalPages, 5);
      el.innerHTML = `
        <button class="btn" data-page="${Math.max(1, page - 1)}" ${page <= 1 ? 'disabled' : ''}>上一页</button>
        ${pages.map(item => item === '…'
          ? '<span class="page-ellipsis">…</span>'
          : `<button class="btn page-number-btn ${item === page ? 'active' : ''}" data-page="${item}" aria-label="第 ${item} 页">${formatNumber(item)}</button>`
        ).join('')}
        <span class="page-label">${formatNumber(page)} / ${formatNumber(totalPages)}</span>
        <button class="btn" data-page="${Math.min(totalPages, page + 1)}" ${page >= totalPages ? 'disabled' : ''}>下一页</button>
      `;
    }

    function buildPageWindow(current, total, radius = 5) {
      const pages = [];
      const add = value => {
        if (!pages.includes(value)) pages.push(value);
      };
      add(1);
      for (let page = Math.max(1, current - radius); page <= Math.min(total, current + radius); page += 1) {
        add(page);
      }
      add(total);
      return pages
        .sort((a, b) => a - b)
        .reduce((acc, page, index, list) => {
          if (index > 0 && page - list[index - 1] > 1) acc.push('…');
          acc.push(page);
          return acc;
        }, []);
    }

    function syncUrl() {
      const params = new URLSearchParams();
      if (state.q) params.set('q', state.q);
      const next = `${location.pathname}${params.toString() ? `?${params}` : ''}`;
      history.replaceState(null, '', next);
    }

    function readUrl() {
      const params = new URLSearchParams(location.search);
      state.q = params.get('q') || '';
      state.source = 'all';
      state.sort = 'pubdate_desc';
      state.page = 1;
      state.pageSize = 40;
      state.fields = new Set(['title', 'artist']);
      $('#q').value = state.q;
      $('#sort').value = state.sort;
      syncPageSizeSegments();
      syncFieldChips();
    }

    function activeFieldsParam() {
      return Array.from(state.fields).join(',');
    }

    async function loadBootstrap() {
      setStatus('正在连接服务端...');
      const res = await fetch(`${API_BASE}/api/bootstrap`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`bootstrap ${res.status}`);
      const payload = await res.json();
      state.files = Array.isArray(payload.files) ? payload.files : [];
      state.aliases = payload.fileToAlias || {};
      state.profiles = payload.sourceProfiles || {};
      state.stats = payload.sourceStats || {};
      state.summary = {
        totalSongs: payload.totalSongs || 0,
        searchUnique: payload.totalUnique || 0
      };
      state.files.sort(compareSourcesByCount);
      renderSources();
      renderMetrics();
      saveHomeFilters();
    }

    async function runSearch({ keepPage = false } = {}) {
      if (!keepPage) state.page = 1;
      state.q = $('#q').value.trim();
      state.sort = $('#sort').value;
      saveHomeFilters();
      const requestId = ++state.lastRequest;
      if (state.controller) state.controller.abort();
      state.controller = new AbortController();
      setStatus('正在搜索...');
      const params = new URLSearchParams({
        page: String(state.page),
        pageSize: String(state.pageSize),
        source: state.source,
        fields: activeFieldsParam(),
        sort: state.sort
      });
      if (state.q) params.set('q', state.q);
      try {
        const res = await fetch(`${API_BASE}/api/search?${params}`, {
          cache: 'no-store',
          signal: state.controller.signal
        });
        if (!res.ok) throw new Error(`search ${res.status}`);
        const payload = await res.json();
        if (requestId !== state.lastRequest) return;
        state.items = Array.isArray(payload.items)
          ? payload.items.map((item, index) => ({ ...item, rowId: item.rowId || String(index) }))
          : [];
        state.total = Number(payload.total || 0);
        state.totalPages = Number(payload.totalPages || 1);
        state.page = Number(payload.page || state.page);
        state.summary = payload.summary || state.summary || {};
        syncUrl();
        renderMetrics();
        renderResults();
        renderPagination();
        setStatus(`已返回 ${formatNumber(state.items.length)} 条，本次匹配 ${formatNumber(state.total)} 条`);
        renderMobileSummary();
      } catch (error) {
        if (error.name === 'AbortError') return;
        setStatus(`查询失败：${error.message}`, true);
      }
    }

    function getRowById(rowId) {
      return state.items.find(item => item.rowId === rowId) || null;
    }

    function rowText(item, preset) {
      const title = item.title || '';
      const artist = isValidArtist(item.artist) ? item.artist : '';
      if (preset === 'link') return item.link || '';
      if (preset === 'titleArtistLink') return [artist ? `${title} - ${artist}` : title, item.link || ''].filter(Boolean).join(' ');
      if (preset === 'tsv') return [title, artist, item.collection || '', sourceName(item.source), item.link || '', extractBv(item), formatDateTime(item.pubdate)].join('\t');
      return artist ? `${title} - ${artist}` : title;
    }

    function getCopyFields() {
      const fields = $$('[data-copy-field]').filter(input => input.checked).map(input => input.dataset.copyField);
      return fields.length ? fields : ['title'];
    }

    function getCopyFormat() {
      return $('#copyFormat')?.value === 'tsv' ? 'tsv' : 'text';
    }

    function getCopySeparator() {
      const separator = $('#copySeparator')?.value ?? ' ';
      return separator === '' ? ' ' : separator;
    }

    function sanitizeCopyValue(value) {
      return String(value ?? '').replace(/\t/g, ' ').replace(/\r?\n/g, ' ');
    }

    function copyFieldValue(item, field) {
      if (field === 'title') return item.title || '';
      if (field === 'artist') return isValidArtist(item.artist) ? item.artist : '';
      if (field === 'collection') return item.collection || '';
      if (field === 'source') return sourceName(item.source);
      if (field === 'link') return item.link || '';
      if (field === 'bvid') return extractBv(item);
      if (field === 'pubdate') return formatDateTime(item.pubdate);
      return '';
    }

    function customText(items) {
      const fields = getCopyFields();
      const validOnly = $('[data-copy-valid]')?.checked;
      const separator = getCopyFormat() === 'tsv' ? '\t' : getCopySeparator();
      const rows = items
        .filter(item => !validOnly || isValidArtist(item.artist))
        .map(item => fields.map(field => sanitizeCopyValue(copyFieldValue(item, field))).join(separator));
      return rows.join('\n');
    }

    async function writeClipboard(text) {
      if (!text.trim()) {
        showToast('没有可复制内容');
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      showToast('已复制');
    }

    async function copyCurrentPage(preset) {
      const text = preset === 'custom'
        ? customText(state.items)
        : state.items.map(item => rowText(item, preset)).join('\n');
      await writeClipboard(text);
    }

    async function copyAllResults() {
      const params = new URLSearchParams({
        source: state.source,
        fields: activeFieldsParam(),
        sort: state.sort,
        copyFields: getCopyFields().join(','),
        format: getCopyFormat(),
        separator: getCopySeparator()
      });
      if ($('[data-copy-valid]')?.checked) params.set('validArtistOnly', '1');
      if (state.q) params.set('q', state.q);
      setStatus('正在导出全部结果用于复制...');
      const res = await fetch(`${API_BASE}/api/search/export?${params}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`copy ${res.status}`);
      const text = await res.text();
      await writeClipboard(text);
      setStatus(`已复制全部匹配结果：${formatNumber(state.total)} 条`);
    }

    function setCustomCopyOpen(open, { persist = true } = {}) {
      const customCopy = $('#customCopy');
      const toggle = $('#toggleCustomCopy');
      if (!customCopy || !toggle) return;
      customCopy.classList.toggle('open', !!open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      if (open) {
        const action = $('#copyAction');
        if (action) action.value = 'custom';
      }
      if (persist) saveCopySettings();
    }

    function openMobileSheet(id) {
      const backdrop = $('#mobileSheetBackdrop');
      if (!backdrop) return;
      $$('.mobile-sheet').forEach(sheet => {
        const isOpen = sheet.id === id;
        sheet.classList.toggle('open', isOpen);
        sheet.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
      });
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
      if (id === 'filterSheet') {
        renderSources($('#mobileSourceSearch')?.value || '');
        renderMobileControls();
      }
    }

    function closeMobileSheets() {
      $$('.mobile-sheet').forEach(sheet => {
        sheet.classList.remove('open');
        sheet.setAttribute('aria-hidden', 'true');
      });
      $('#mobileSheetBackdrop')?.classList.remove('open');
      document.body.style.overflow = '';
    }

    function syncDesktopCopyFromMobile() {
      const fields = new Set($$('[data-mobile-copy-field].active').map(btn => btn.dataset.mobileCopyField));
      if (!fields.size) fields.add('title');
      $$('[data-copy-field]').forEach(input => {
        input.checked = fields.has(input.dataset.copyField);
      });
      const valid = $('#mobileCopyValidOnly')?.classList.contains('active');
      const validInput = $('[data-copy-valid]');
      if (validInput) validInput.checked = !!valid;
      const formatInput = $('#copyFormat');
      const mobileFormat = $('#mobileCopyFormat')?.dataset.format || 'text';
      if (formatInput) formatInput.value = mobileFormat === 'tsv' ? 'tsv' : 'text';
      const separatorInput = $('#copySeparator');
      const mobileSeparator = $('#mobileCopySeparator')?.value ?? ' ';
      if (separatorInput) separatorInput.value = mobileSeparator || ' ';
      saveCopySettings();
    }

    async function runSelectedCopyAction() {
      const action = $('#copyAction')?.value || 'titleArtist';
      if (action === 'all') {
        await copyAllResults();
        return;
      }
      await copyCurrentPage(action);
    }

    function bindEvents() {
      $('#searchBtn').addEventListener('click', () => runSearch());
      $('#refreshBtn').addEventListener('click', () => runSearch({ keepPage: true }));
      $('#q').addEventListener('keydown', event => {
        if (event.key === 'Enter') runSearch();
      });
      let timer = null;
      $('#q').addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => runSearch(), 360);
      });
      $('#sort').addEventListener('change', () => runSearch());
      $('#sourceFilter').addEventListener('input', event => renderSources(event.target.value));
      $('#sourceList').addEventListener('click', event => {
        const btn = event.target.closest('[data-source]');
        if (!btn) return;
        state.source = btn.dataset.source;
        renderSources($('#sourceFilter').value);
        saveHomeFilters();
        runSearch();
      });
      $('#sourceMobile').addEventListener('change', event => {
        state.source = event.target.value;
        renderSources($('#sourceFilter').value);
        saveHomeFilters();
        runSearch();
      });
      $('#fieldChips').addEventListener('click', event => {
        const btn = event.target.closest('[data-field]');
        if (!btn) return;
        const field = btn.dataset.field;
        if (state.fields.has(field)) state.fields.delete(field);
        else state.fields.add(field);
        if (state.fields.size === 0) state.fields.add('title');
        syncFieldChips();
        saveHomeFilters();
        runSearch();
      });
      $$('.segment').forEach(btn => btn.addEventListener('click', () => {
        state.pageSize = Number(btn.dataset.pageSize);
        syncPageSizeSegments();
        saveHomeFilters();
        runSearch();
      }));
      $('#pagination').addEventListener('click', event => {
        const btn = event.target.closest('[data-page]');
        if (!btn || btn.disabled) return;
        state.page = Number(btn.dataset.page);
        runSearch({ keepPage: true });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      $('#results').addEventListener('click', event => {
        const copyTarget = event.target.closest('[data-copy-value]');
        if (copyTarget) {
          const encoded = copyTarget.getAttribute('data-copy-value') || '';
          writeClipboard(encoded ? decodeURIComponent(encoded) : copyTarget.textContent || '');
          return;
        }
        const btn = event.target.closest('[data-row-copy]');
        if (!btn) return;
        const item = getRowById(btn.dataset.rowId);
        if (item) writeClipboard(rowText(item, btn.dataset.rowCopy));
      });
      $('#copyAction').addEventListener('change', event => {
        if (event.target.value === 'custom') setCustomCopyOpen(true, { persist: false });
        saveCopySettings();
      });
      $('#copyActionBtn').addEventListener('click', () => runSelectedCopyAction().catch(error => {
        setStatus(`复制失败：${error.message}`, true);
      }));
      $('#toggleCustomCopy').addEventListener('click', () => {
        const customCopy = $('#customCopy');
        setCustomCopyOpen(!customCopy.classList.contains('open'));
      });
      $('#customCopy').addEventListener('change', saveCopySettings);
      $('#copySeparator').addEventListener('input', saveCopySettings);
      $('#mobilePageOpen')?.addEventListener('click', () => openMobileSheet('pageSheet'));
      $$('[data-open-sheet]').forEach(btn => btn.addEventListener('click', () => openMobileSheet(btn.dataset.openSheet)));
      $('#mobileCopyOpen')?.addEventListener('click', () => {
        syncMobileCopyFromDesktop();
        openMobileSheet('copySheet');
      });
      $('#mobileSheetBackdrop')?.addEventListener('click', closeMobileSheets);
      $$('[data-close-sheet]').forEach(btn => btn.addEventListener('click', closeMobileSheets));
      $('#mobileSortSelect')?.addEventListener('change', event => {
        state.sort = event.target.value;
        $('#sort').value = state.sort;
        saveHomeFilters();
        renderMobileControls();
        runSearch();
      });
      $('#mobileFieldChips')?.addEventListener('click', event => {
        const btn = event.target.closest('[data-mobile-field]');
        if (!btn) return;
        const field = btn.dataset.mobileField;
        if (state.fields.has(field)) state.fields.delete(field);
        else state.fields.add(field);
        if (state.fields.size === 0) state.fields.add('title');
        syncFieldChips();
        saveHomeFilters();
        runSearch();
      });
      $('#mobilePageSizeOptions')?.addEventListener('click', event => {
        const btn = event.target.closest('[data-mobile-page-size]');
        if (!btn) return;
        state.pageSize = Number(btn.dataset.mobilePageSize);
        syncPageSizeSegments();
        saveHomeFilters();
        runSearch();
      });
      $('#mobileSourceSearch')?.addEventListener('input', event => renderSources(event.target.value));
      $('#mobileSourceOptions')?.addEventListener('click', event => {
        const btn = event.target.closest('[data-mobile-source]');
        if (!btn) return;
        state.source = btn.dataset.mobileSource;
        renderSources($('#mobileSourceSearch')?.value || '');
        saveHomeFilters();
        runSearch();
        closeMobileSheets();
      });
      $('#mobileCopyFields')?.addEventListener('click', event => {
        const btn = event.target.closest('[data-mobile-copy-field]');
        if (!btn) return;
        btn.classList.toggle('active');
        if (!$$('[data-mobile-copy-field].active').length) {
          btn.classList.add('active');
        }
      });
      $('#mobileCopyValidOnly')?.addEventListener('click', event => {
        const btn = event.currentTarget;
        const next = !btn.classList.contains('active');
        btn.classList.toggle('active', next);
        btn.setAttribute('aria-pressed', next ? 'true' : 'false');
      });
      $('#mobileCopyFormat')?.addEventListener('click', event => {
        const btn = event.currentTarget;
        const next = btn.dataset.format === 'tsv' ? 'text' : 'tsv';
        btn.dataset.format = next;
        btn.textContent = next === 'tsv' ? 'TSV' : '纯文本';
        btn.classList.toggle('active', next === 'tsv');
      });
      $('#copySheet')?.addEventListener('click', event => {
        const btn = event.target.closest('[data-mobile-copy]');
        if (!btn) return;
        const action = btn.dataset.mobileCopy;
        syncDesktopCopyFromMobile();
        const job = action === 'all' ? copyAllResults() : copyCurrentPage(action);
        job.then(closeMobileSheets).catch(error => {
          setStatus(`复制失败：${error.message}`, true);
        });
      });
      window.addEventListener('resize', () => {
        clearTimeout(artistResizeTimer);
        artistResizeTimer = setTimeout(() => scheduleArtistChipFit(), 120);
      });
    }

    async function init() {
      try {
        clearLegacyHomeStorage();
        readUrl();
        restoreCopySettings();
        bindEvents();
        document.fonts?.ready?.then(() => scheduleArtistChipFit()).catch(() => {});
        await loadBootstrap();
        if (!state.files.includes(state.source) && state.source !== 'all') state.source = 'all';
        renderSources();
        await runSearch({ keepPage: true });
      } catch (error) {
        setStatus(`初始化失败：${error.message}`, true);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
