<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>B站歌单JSON -> songData转换器</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background: #f4f4f4; }
        h2 { border-bottom: 2px solid #00a1d6; padding-bottom: 10px; color: #333; }
        .container { display: flex; gap: 20px; margin-bottom: 20px; }
        .box { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; }
        textarea { width: 100%; height: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; resize: vertical; box-sizing: border-box; }
        button { background-color: #00a1d6; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; }
        button:hover { background-color: #008ebf; }
        .note { background: #fff3cd; padding: 10px; border-radius: 4px; margin-bottom: 20px; color: #856404; }
        .module-nav { margin: 10px 0 18px 0; font-size: 14px; color: #6c757d; }
        .module-nav a { color: #00a1d6; text-decoration: none; }
        .module-nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h2>🎵 数据自动转换器</h2>
    <div class="module-nav">
        <a href="/">首页</a> |
        <a href="/bv">BV号查重</a> |
        <a href="/dup">歌名-歌手查重</a> |
        <a href="/check">歌名-歌手查询/校验</a> |
        <a href="/stats">统计页</a>
    </div>
    
    <div class="note">
        <strong>使用说明：</strong><br>
        1. 在B站视频页面，按住 <strong>Shift + 点击油猴脚本按钮</strong> 复制 JSON 数据。<br>
        2. 将数据粘贴在左侧输入框。<br>
        3. 点击“转换”按钮，复制右侧结果替换你的 HTML 中的 <code>songData = [...]</code> 部分。
    </div>

    <div class="container">
        <div class="box">
            <label>第一步：粘贴 JSON 数据 (来自油猴脚本)</label>
            <textarea id="input-json" placeholder='[{"collectionBv": "BV1xx...", "collectionTitle": "...", "up": "...", "parts": ["P1...", "P2..."]}]'></textarea>
        </div>
        <div class="box">
            <label>第二步：获取 songData 代码</label>
            <textarea id="output-code" readonly placeholder="结果将显示在这里..."></textarea>
        </div>
    </div>

    <button onclick="convertData()">🔄 开始转换</button>
    <button onclick="copyOutput()" style="background-color: #28a745;">📋 复制结果</button>

    <script>
        // 解析歌名的辅助函数：尝试分离 "序号. 歌名 - 歌手"
        function parseTitle(fullTitle) {
            // 移除开头的序号 "01. " 或 "P1："
            let clean = fullTitle.replace(/^\d+\.\s*/, '').replace(/^P\d+[：:]\s*/, '');
            
            let artist = "未知歌手";
            let title = clean;

            // 尝试匹配 "歌名 - 歌手" 或 "歌手 - 歌名"
            // 这里简单处理，以最后一个 " - " 为分隔符
            if (clean.includes(' - ')) {
                const parts = clean.split(' - ');
                // 假设格式是 "Title - Artist"
                // 如果是日文，通常前面是歌名，后面是歌手或反之，这里简单把后半段当歌手
                title = parts.slice(0, -1).join(' - ');
                artist = parts[parts.length - 1];
            } else if (clean.includes('/')) {
                 // 有些格式是 歌手/歌名
                 const parts = clean.split('/');
                 artist = parts[0].trim();
                 title = parts.slice(1).join('/').trim();
            }

            return { title, artist };
        }

        function convertData() {
            const input = document.getElementById('input-json').value.trim();
            if (!input) {
                alert("请先在左侧粘贴数据！");
                return;
            }

            try {
                const data = JSON.parse(input);
                const songs = [];

                data.forEach(collection => {
                    const baseLink = `https://www.bilibili.com/video/${collection.collectionBv}`;
                    // 净化合集名（去掉日期和UP主标签，只留核心标题）
                    let colName = collection.collectionTitle;
                    // 简单的净化逻辑：去掉 [xxxx] 标签
                    colName = colName.replace(/\[.*?\]/g, '').trim();

                    collection.parts.forEach((partStr, index) => {
                        const parsed = parseTitle(partStr);
                        
                        songs.push({
                            title: parsed.title,
                            artist: parsed.artist,
                            collection: colName,
                            up: collection.up,
                            link: `${baseLink}?p=${index + 1}`
                        });
                    });
                });

                // 生成 JS 代码字符串（修改版）
let outputStr = `// 数据文件生成时间: ${new Date().toLocaleString()}\n`;
outputStr += "window.SONG_DATA = window.SONG_DATA || [];\n\n";
outputStr += "window.SONG_DATA.push(\n";

songs.forEach((song, i) => {
    outputStr += `    ${JSON.stringify(song)}`;
    if (i < songs.length - 1) outputStr += ",";
    outputStr += "\n";
});

outputStr += ");";

document.getElementById('output-code').value = outputStr;

            } catch (e) {
                console.error(e);
                alert("JSON 解析失败，请确保复制的是正确的数据！\n错误信息: " + e.message);
            }
        }

        function copyOutput() {
            const textarea = document.getElementById('output-code');
            if(!textarea.value) return;
            textarea.select();
            document.execCommand('copy');
            alert("已复制到剪贴板！请去替换 HTML 文件里的 songData。");
        }
    </script>
</body>
</html>
