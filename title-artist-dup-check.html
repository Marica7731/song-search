<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌名-歌手查重</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f6f7f9;padding:20px}
.main{max-width:1180px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h2{color:#2c3e50;margin-bottom:8px}
.header p{color:#6c757d;font-size:14px}
.module-nav{text-align:center;margin-bottom:16px;font-size:14px;color:#6c757d}
.module-nav a{color:#00a1d6;text-decoration:none;font-weight:500}
.module-nav a:hover{text-decoration:underline}
.search-box{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
#titleArtistInput{flex:1;min-width:320px;min-height:130px;padding:14px 16px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;resize:vertical}
#searchBtn{padding:0 24px;background:#00a1d6;color:#fff;border:0;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.source-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e9ecef}
.source-tab{padding:8px 14px;background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:13px}
.source-tab.active{background:#00a1d6;color:#fff;border-color:#00a1d6}
.filter-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.stat-info{font-size:13px;color:#495057}
.filter-btn{padding:6px 14px;background:#28a745;color:#fff;border:0;border-radius:6px;cursor:pointer;font-size:13px;margin-left:8px}
.filter-btn.active{background:#1e7e34}
.copy-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.copy-controls label{font-size:13px;color:#495057;display:flex;align-items:center;gap:4px}
.copy-btn{padding:6px 14px;background:#6f42c1;color:#fff;border:0;border-radius:6px;cursor:pointer;font-size:13px}
.result-list{margin-bottom:30px}
.song-item{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px;border-left:4px solid #ddd;box-shadow:0 2px 4px rgba(0,0,0,.04)}
.song-item.dup{border-left-color:#dc3545}
.song-item.unique{border-left-color:#28a745}
.song-item.not-found{border-left-color:#ffc107}
.song-title{font-weight:600;color:#2c3e50;margin-bottom:8px}
.dup-tag,.unique-tag,.not-found-tag{display:inline-block;color:#fff;font-size:12px;padding:2px 8px;border-radius:4px;margin-left:8px}
.dup-tag{background:#dc3545}.unique-tag{background:#28a745}.not-found-tag{background:#ffc107}
.meta-info{font-size:13px;color:#495057;line-height:1.7}
.dup-list{margin-top:10px}
.dup-item{display:flex;align-items:center;gap:6px;margin-top:4px;padding:4px 8px;background:#f8f9fa;border-radius:4px;font-size:12px}
.bv-tag{display:inline-block;background:#6f42c1;color:#fff;font-size:11px;padding:2px 6px;border-radius:3px}
.copy-toast{position:fixed;bottom:30px;right:30px;padding:10px 20px;background:rgba(0,0,0,.8);color:#fff;border-radius:4px;font-size:14px;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none;z-index:9999}
.copy-toast.show{opacity:1;transform:translateY(0)}
.back-top{position:fixed;right:24px;bottom:24px;width:42px;height:42px;border:0;border-radius:999px;background:#00a1d6;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 6px 16px rgba(0,161,214,.35);opacity:0;pointer-events:none;transform:translateY(6px);transition:all .2s;z-index:3000}
.back-top.show{opacity:1;pointer-events:auto;transform:translateY(0)}
</style>
</head>
<body>
<div class="main">
  <div class="header">
    <h2>歌名-歌手查重</h2>
    <p>按“歌名 - 歌手”批量分析，查看是否重复与来源分布</p>
  </div>
  <div class="module-nav">
    <a href="index.html">首页</a> |
    <a href="stats.html">查看演唱者统计与排行</a> |
    <a href="bv-dup-check.html">BV号查重</a> |
    歌名-歌手查重 |
    <a href="title-artist-check.html">歌名-歌手查询/校验</a> |
    <a href="song-growth.html">歌曲增长日报</a>
  </div>

  <div class="search-box">
    <textarea id="titleArtistInput" placeholder="输入格式支持：
1) 01. 歌名 - 歌手
2) 歌名
3) 歌名 - 歌手
可批量每行一条"></textarea>
    <button id="searchBtn">开始分析</button>
  </div>

  <div class="source-tabs" id="tabContainer"></div>

  <div class="filter-bar">
    <div class="stat-info" id="statInfo">请先输入 歌名-歌手 开始分析</div>
    <div>
      <button class="filter-btn active" id="showAllBtn">显示全部</button>
      <button class="filter-btn" id="showUniqueBtn">只看非重复</button>
    </div>
  </div>

  <div class="copy-controls">
    <label><input type="checkbox" id="copyOnlyUnique" checked>仅复制非重复</label>
    <label><input type="checkbox" id="copyTitle" checked>歌名</label>
    <label><input type="checkbox" id="copyLink">链接</label>
    <label><input type="checkbox" id="copySource">来源</label>
    <label><input type="radio" name="copyFormat" id="copyText" checked>纯文本</label>
    <label><input type="radio" name="copyFormat" id="copyTable">表格</label>
    <button class="copy-btn" id="copyBtn">复制结果</button>
  </div>

  <div class="result-list" id="resultList"></div>
</div>
<div class="copy-toast" id="copyToast">复制成功</div>
<button class="back-top" id="backTopBtn" type="button" aria-label="回到顶部">↑</button>
<script src="dup-check-core.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initDupCheckPage('titleArtist');
  const backTopBtn = document.getElementById('backTopBtn');
  const updateBackTop = () => backTopBtn.classList.toggle('show', window.scrollY > 260);
  window.addEventListener('scroll', updateBackTop, { passive: true });
  backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  updateBackTop();
});
</script>
</body>
</html>
