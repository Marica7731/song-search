<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来源配置后台</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/site-theme.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 700;
      color: #111827;
    }
    .desc {
      margin: 0 0 14px;
      font-size: 14px;
      color: #6b7280;
    }
    .top-nav {
      margin-bottom: 16px;
      font-size: 14px;
      color: #4b5563;
    }
    .top-nav a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }
    .top-nav a:hover { text-decoration: underline; }
    .panel {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      height: 34px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #94a3b8;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      min-height: 22px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #475569;
    }
    .status.error { color: #b91c1c; }
    .meta {
      display: grid;
      gap: 4px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #64748b;
      word-break: break-all;
    }
    textarea {
      width: 100%;
      min-height: 560px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.45;
      resize: vertical;
      background: #f8fafc;
      color: #0f172a;
    }
    .tips {
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }
    .tips code {
      background: #eef2ff;
      padding: 1px 6px;
      border-radius: 4px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>来源配置后台</h1>
    <p class="desc">通过 <code>#admin=你的token</code> 开启管理模式。保存后可直接触发刷新，下一次自动任务也会按新配置同步歌曲。</p>
    <div class="top-nav">
      <a href="/">首页</a> |
      <a href="/stats">数据</a> |
      <a href="/bv">BV查重</a> |
      <a href="/dup">歌名歌手查重</a> |
      <a href="/check">命名工具</a> |
      <a href="/growth">日报</a>
    </div>

    <div class="panel">
      <div class="actions">
        <button id="loadBtn" type="button">读取配置</button>
        <button id="saveBtn" type="button" disabled>保存运行时配置</button>
        <button id="resetBtn" type="button" disabled>恢复默认配置</button>
        <button id="refreshBtn" type="button" disabled>保存后刷新歌库</button>
      </div>
      <div id="status" class="status">等待加载</div>
      <div class="meta">
        <div id="loadedFrom">当前来源：-</div>
        <div id="runtimeState">运行时覆盖：-</div>
        <div id="runtimePaths">运行时路径：-</div>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="点击“读取配置”加载 JSON"></textarea>
      <div class="tips">
        保存格式：顶层数组，每项至少包含 <code>bvids</code>。<br>
        示例：<code>{"bvids":["BVxxxx"],"file":"culua","alias":"CULUA"}</code>。<br>
        支持直接写 BV 链接，系统会自动提取 BV 号并去重。
      </div>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = 'songSearchAdminToken';
      const HASH_PREFIX = '#admin=';
      const statusEl = document.getElementById('status');
      const loadedFromEl = document.getElementById('loadedFrom');
      const runtimeStateEl = document.getElementById('runtimeState');
      const runtimePathsEl = document.getElementById('runtimePaths');
      const editor = document.getElementById('editor');
      const loadBtn = document.getElementById('loadBtn');
      const saveBtn = document.getElementById('saveBtn');
      const resetBtn = document.getElementById('resetBtn');
      const refreshBtn = document.getElementById('refreshBtn');

      function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.className = 'status' + (isError ? ' error' : '');
      }

      function readHashToken() {
        const hash = window.location.hash || '';
        if (!hash.startsWith(HASH_PREFIX)) return '';
        return decodeURIComponent(hash.slice(HASH_PREFIX.length)).trim();
      }

      function storeTokenFromHash() {
        const hashToken = readHashToken();
        if (!hashToken) return '';
        if (hashToken === 'clear' || hashToken === 'off') {
          localStorage.removeItem(STORAGE_KEY);
          history.replaceState(null, '', window.location.pathname + window.location.search);
          return '';
        }
        localStorage.setItem(STORAGE_KEY, hashToken);
        history.replaceState(null, '', window.location.pathname + window.location.search);
        return hashToken;
      }

      function getToken() {
        const hashToken = storeTokenFromHash();
        if (hashToken) return hashToken;
        return (localStorage.getItem(STORAGE_KEY) || '').trim();
      }

      function getHeaders() {
        const token = getToken();
        if (!token) return null;
        return {
          'X-Admin-Token': token,
          'Content-Type': 'application/json'
        };
      }

      async function readJson(url, options) {
        const response = await fetch(url, {
          cache: 'no-store',
          ...(options || {})
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || ('HTTP ' + response.status));
        }
        return payload;
      }

      function setMeta(meta) {
        loadedFromEl.textContent = '当前来源：' + (meta.loadedFrom || '-');
        runtimeStateEl.textContent = '运行时覆盖：' + (meta.runtimeOverrideActive ? '已启用' : '未启用');
        runtimePathsEl.textContent = '运行时路径：' + ((meta.runtimeCandidates || []).join(' | ') || '-');
      }

      function setButtonsEnabled(enabled) {
        saveBtn.disabled = !enabled;
        resetBtn.disabled = !enabled;
        refreshBtn.disabled = !enabled;
      }

      async function loadConfig() {
        const headers = getHeaders();
        if (!headers) {
          setStatus('未检测到管理 token，请在 URL 使用 #admin=token', true);
          return;
        }
        setStatus('读取中...');
        setButtonsEnabled(false);
        try {
          const payload = await readJson('/api/admin/singer-configs', {
            headers: { 'X-Admin-Token': headers['X-Admin-Token'] }
          });
          editor.value = JSON.stringify(payload.configs || [], null, 2);
          setMeta(payload);
          setStatus('读取成功，可编辑后保存');
          setButtonsEnabled(true);
        } catch (error) {
          setStatus('读取失败：' + error.message, true);
        }
      }

      function parseEditorConfig() {
        let parsed;
        try {
          parsed = JSON.parse(editor.value || '[]');
        } catch (_) {
          throw new Error('JSON 格式错误，请先修复');
        }
        if (!Array.isArray(parsed)) {
          throw new Error('顶层必须是数组');
        }
        return parsed;
      }

      async function saveConfig(triggerRefresh) {
        const headers = getHeaders();
        if (!headers) {
          setStatus('未检测到管理 token，请在 URL 使用 #admin=token', true);
          return;
        }

        let configs;
        try {
          configs = parseEditorConfig();
        } catch (error) {
          setStatus(error.message, true);
          return;
        }

        setStatus('保存中...');
        setButtonsEnabled(false);
        try {
          const saved = await readJson('/api/admin/singer-configs', {
            method: 'POST',
            headers,
            body: JSON.stringify({ configs })
          });
          setStatus(`保存成功：${saved.sourceCount} 个来源，${saved.bvidCount} 个 BV`);
          await loadConfig();
          if (triggerRefresh) {
            await triggerRefreshTask();
          }
        } catch (error) {
          setStatus('保存失败：' + error.message, true);
          setButtonsEnabled(true);
        }
      }

      async function triggerRefreshTask() {
        const headers = getHeaders();
        if (!headers) return;
        setStatus('已保存，提交刷新任务中...');
        try {
          await readJson('/api/admin/refresh', {
            method: 'POST',
            headers: { 'X-Admin-Token': headers['X-Admin-Token'] }
          });
          setStatus('刷新任务已提交，稍后可在首页管理角标查看状态');
        } catch (error) {
          setStatus('刷新提交失败：' + error.message, true);
        }
      }

      async function resetRuntimeConfig() {
        const headers = getHeaders();
        if (!headers) return;
        setStatus('恢复中...');
        setButtonsEnabled(false);
        try {
          const payload = await readJson('/api/admin/singer-configs/reset-runtime', {
            method: 'POST',
            headers: { 'X-Admin-Token': headers['X-Admin-Token'] }
          });
          editor.value = JSON.stringify(payload.configs || [], null, 2);
          loadedFromEl.textContent = '当前来源：' + (payload.loadedFrom || '-');
          runtimeStateEl.textContent = '运行时覆盖：' + (payload.runtimeOverrideActive ? '已启用' : '未启用');
          setStatus('已恢复默认配置');
          setButtonsEnabled(true);
        } catch (error) {
          setStatus('恢复失败：' + error.message, true);
          setButtonsEnabled(true);
        }
      }

      loadBtn.addEventListener('click', loadConfig);
      saveBtn.addEventListener('click', function () { saveConfig(false); });
      resetBtn.addEventListener('click', resetRuntimeConfig);
      refreshBtn.addEventListener('click', function () { saveConfig(true); });

      if (getToken()) {
        loadConfig();
      } else {
        setStatus('未检测到管理 token，请在 URL 使用 #admin=token', true);
      }
    })();
  </script>
</body>
</html>
