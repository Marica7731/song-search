<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歌曲增长日报</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/site-theme.css">
  <style>
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f3f4f6;margin:0;padding:28px 16px;color:#24323f}
    .main{max-width:1480px;margin:0 auto}
    .panel{background:#fff;border-radius:14px;box-shadow:0 3px 14px rgba(0,0,0,.06);padding:20px;border:1px solid #d0d7de}
    h1{margin:0 0 8px;color:#2c3e50}
    .sub{margin-bottom:14px;color:#6c757d;font-size:14px;line-height:1.5}
    .nav{margin-bottom:16px;text-align:center;color:#6c757d;font-size:14px}
    .nav a{color:#00a1d6;text-decoration:none;font-weight:600}
    .nav a:hover{text-decoration:underline}
    .hint-box{margin:0 0 14px;padding:12px 14px;border-radius:12px;background:#fff;border:1px solid #d0d7de;color:#52606d;font-size:13px;line-height:1.6}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:12px 0 16px}
    .kpi{background:#f8fafc;border:1px solid #e7edf3;border-radius:10px;padding:10px 12px}
    .kpi .label{font-size:12px;color:#7b8794;margin-bottom:4px}
    .kpi .value{font-size:20px;color:#203040;font-weight:700}
    .kpi .value.up{color:#1a8f4c}
    .kpi .value.down{color:#cc2f3f}
    .analysis-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:0 0 16px}
    .analysis-card{background:#fff;border:1px solid #d0d7de;border-radius:10px;padding:14px 16px}
    .analysis-card .label{font-size:12px;color:#667085;margin-bottom:6px}
    .analysis-card .value{font-size:24px;font-weight:800;color:#111827;line-height:1.15}
    .analysis-card .meta{margin-top:6px;font-size:12px;color:#667085;line-height:1.5}
    .analysis-card .value.up{color:#1a8f4c}
    .analysis-card .value.down{color:#cc2f3f}
    .analysis-board{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:0 0 16px}
    .analysis-panel{background:#fff;border:1px solid #d0d7de;border-radius:10px;padding:14px 16px}
    .analysis-panel h3{margin:0 0 10px;font-size:14px;color:#1f2328}
    .top-list{display:flex;flex-direction:column;gap:8px}
    .top-row{display:grid;grid-template-columns:34px minmax(0,1fr);gap:10px;align-items:start;padding:8px 0;border-top:1px solid #eef2f6}
    .top-row:first-child{border-top:0;padding-top:0}
    .top-rank{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;background:#f3f4f6;border:1px solid #d0d7de;font-size:12px;font-weight:700;color:#111827}
    .top-main{min-width:0}
    .top-title{font-size:13px;font-weight:700;color:#1f2328;line-height:1.4}
    .top-meta{margin-top:3px;font-size:12px;color:#667085;line-height:1.5}
    .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
    .mode-select,.metric-select{padding:6px 10px;border:1px solid #d6e3ef;border-radius:8px;background:#fff}
    .range-btn{border:1px solid #d6e3ef;background:#fff;color:#335;cursor:pointer;padding:6px 12px;border-radius:999px;font-size:13px}
    .range-btn.active{background:#00a1d6;color:#fff;border-color:#00a1d6}
    .chart-wrap{position:relative;border:1px solid #e7edf3;border-radius:12px;background:#fff;padding:10px}
    #growthChart{width:100%;height:360px;display:block}
    .chart-foot{display:flex;justify-content:space-between;color:#6c757d;font-size:12px;margin-top:8px;gap:10px;flex-wrap:wrap}
    .chart-tooltip{position:absolute;display:none;min-width:220px;max-width:280px;padding:10px 12px;border-radius:10px;background:rgba(32,48,64,.95);color:#fff;font-size:12px;line-height:1.6;box-shadow:0 10px 24px rgba(0,0,0,.22);pointer-events:none;z-index:20}
    .chart-tooltip.show{display:block}
    .chart-tooltip strong{display:block;margin-bottom:4px;font-size:13px}
    .chart-tooltip .muted{color:rgba(255,255,255,.72)}
    .table-wrap{margin-top:18px;overflow:auto;border:1px solid #e7edf3;border-radius:10px}
    table{width:100%;border-collapse:collapse;min-width:560px}
    th,td{border-bottom:1px solid #eef2f6;padding:10px 12px;text-align:left}
    th{background:#f8fafc;color:#33475b}
    tbody tr:hover{background:#f9fcff}
    .delta-up{color:#1a8f4c;font-weight:700}
    .delta-down{color:#cc2f3f;font-weight:700}
    .delta-flat{color:#6c757d}
    .pager{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
    .pager-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .pager-btn{padding:6px 10px;border:1px solid #d6e3ef;background:#fff;border-radius:8px;cursor:pointer}
    .pager-btn:disabled{opacity:.45;cursor:not-allowed}
    .pager .info{font-size:13px;color:#6c757d}
    .pager-input{width:72px;padding:6px 8px;border:1px solid #d6e3ef;border-radius:8px;background:#fff}
    .back-top{position:fixed;right:24px;bottom:24px;width:42px;height:42px;border:0;border-radius:999px;background:#00a1d6;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 6px 16px rgba(0,161,214,.35);opacity:0;pointer-events:none;transform:translateY(6px);transition:all .2s;z-index:3000}
    .back-top.show{opacity:1;pointer-events:auto;transform:translateY(0)}
    @media (max-width: 900px){
      body{padding:16px 12px}
      .analysis-board{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="main panel">
    <h1>歌曲增长日报</h1>
    <div class="sub" id="updatedAtText">更新时间：加载中…</div>
    <div class="nav">
      <a href="/">首页</a> |
      <a href="/stats">查看演唱者统计与排行</a> |
      <a href="/bv">BV号查重</a> |
      <a href="/dup">歌名-歌手查重</a> |
      <a href="/check">歌名-歌手查询/校验</a> |
      歌曲增长日报
    </div>
    <div class="hint-box" id="modeHint">
      `库收录增长` 按站点实际入库时间统计。`按投稿时间增长` 按歌曲 `pubdate` 统计每日新增。`稿件播放量` 按稿件发布日期聚合当前播放量。
    </div>

    <div class="kpis">
      <div class="kpi"><div class="label" id="kpiTotalLabel">当前总曲数</div><div class="value" id="kpiTotal">-</div></div>
      <div class="kpi"><div class="label" id="kpiDeltaLabel">当日增量</div><div class="value" id="kpiDelta">-</div></div>
      <div class="kpi"><div class="label">累计记录天数</div><div class="value" id="kpiDays">-</div></div>
      <div class="kpi"><div class="label">当前口径</div><div class="value" id="kpiMode">-</div></div>
    </div>

    <div class="analysis-grid">
      <div class="analysis-card">
        <div class="label">本月峰值日</div>
        <div class="value" id="monthPeakValue">-</div>
        <div class="meta" id="monthPeakMeta">-</div>
      </div>
      <div class="analysis-card">
        <div class="label">历史峰值日</div>
        <div class="value" id="allPeakValue">-</div>
        <div class="meta" id="allPeakMeta">-</div>
      </div>
      <div class="analysis-card">
        <div class="label">近 7 日均值</div>
        <div class="value" id="weekAvgValue">-</div>
        <div class="meta" id="weekAvgMeta">-</div>
      </div>
      <div class="analysis-card">
        <div class="label">本月累计新增</div>
        <div class="value" id="monthTotalValue">-</div>
        <div class="meta" id="monthTotalMeta">-</div>
      </div>
      <div class="analysis-card">
        <div class="label">上月峰值日</div>
        <div class="value" id="prevMonthPeakValue">-</div>
        <div class="meta" id="prevMonthPeakMeta">-</div>
      </div>
    </div>

    <div class="analysis-board">
      <div class="analysis-panel">
        <h3>本月高点</h3>
        <div class="top-list" id="monthTopList"></div>
      </div>
      <div class="analysis-panel">
        <h3>历史高点</h3>
        <div class="top-list" id="allTimeTopList"></div>
      </div>
    </div>

    <div class="controls">
      <select class="mode-select" id="modeSelect">
        <option value="collection">库收录增长</option>
        <option value="publish" selected>按投稿时间增长</option>
        <option value="publishViews">稿件播放量</option>
      </select>
      <button class="range-btn active" data-range="30">近30天</button>
      <button class="range-btn" data-range="90">近90天</button>
      <button class="range-btn" data-range="180">近180天</button>
      <button class="range-btn" data-range="all">全部</button>
      <select class="metric-select" id="metricSelect">
        <option value="total">累计总量</option>
        <option value="delta">当日增量</option>
      </select>
    </div>

    <div class="chart-wrap">
      <canvas id="growthChart"></canvas>
      <div class="chart-tooltip" id="chartTooltip"></div>
      <div class="chart-foot">
        <span id="chartRangeText"></span>
        <span id="chartHint">支持切换口径、范围和指标</span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>日期</th><th>累计总量</th><th>当日增量</th></tr></thead>
        <tbody id="growthTableBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <div class="info" id="pagerInfo"></div>
      <div class="pager-controls">
        <button class="pager-btn" id="prevPageBtn">上一页</button>
        <button class="pager-btn" id="nextPageBtn">下一页</button>
        <input class="pager-input" id="pageInput" type="number" min="1" step="1" placeholder="页码" />
        <button class="pager-btn" id="goPageBtn">跳转</button>
      </div>
    </div>
  </div>
  <button class="back-top" id="backTopBtn" type="button" aria-label="回到顶部">↑</button>

  <script>
    const chartCanvas = document.getElementById('growthChart');
    const rangeTextEl = document.getElementById('chartRangeText');
    const metricSelect = document.getElementById('metricSelect');
    const modeSelect = document.getElementById('modeSelect');
    const chartTooltip = document.getElementById('chartTooltip');
    const tableBody = document.getElementById('growthTableBody');
    const pagerInfo = document.getElementById('pagerInfo');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const pageInput = document.getElementById('pageInput');
    const goPageBtn = document.getElementById('goPageBtn');

    const growthData = {
      collection: [],
      publish: [],
      publishViews: []
    };

    let currentMode = 'publish';
    let currentRange = '30';
    let currentMetric = 'total';
    let currentPage = 1;
    const pageSize = 30;
    let chartState = null;

    function numberText(value) {
      return Number(value || 0).toLocaleString('zh-CN');
    }

    function deltaText(value) {
      if (value > 0) return '+' + value;
      return String(value || 0);
    }

    function deltaClass(value) {
      if (value > 0) return 'delta-up';
      if (value < 0) return 'delta-down';
      return 'delta-flat';
    }

    function getModeLabel() {
      if (currentMode === 'publishViews') return '稿件播放量';
      return currentMode === 'publish' ? '按投稿时间增长' : '库收录增长';
    }

    function getModeMetricLabels() {
      if (currentMode === 'publishViews') {
        return {
          total: '累计播放量',
          delta: '当日稿件播放量',
          avg: '最近 7 天平均每日播放量',
          month: '累计播放量'
        };
      }
      if (currentMode === 'publish') {
        return {
          total: '累计投稿歌曲数',
          delta: '当日新增歌曲',
          avg: '最近 7 天平均每日新增',
          month: '累计新增'
        };
      }
      return {
        total: '当前总曲数',
        delta: '当日入库增量',
        avg: '最近 7 天平均每日新增',
        month: '累计新增'
      };
    }

    function getModeHintText() {
      if (currentMode === 'publishViews') {
        return '`稿件播放量` 按唯一 BV 的发布日期聚合当前播放量，可直接看某一天发布的稿件累计拿到了多少播放。';
      }
      if (currentMode === 'publish') {
        return '`按投稿时间增长` 按歌曲 `pubdate` 统计真实投稿时间增长，更适合看历史发布节奏。';
      }
      return '`库收录增长` 按你的站点实际抓取入库时间统计，更适合看歌库扩张速度。';
    }

    function getCurrentRows() {
      return growthData[currentMode] || [];
    }

    function shiftDate(dateText, offsetDays) {
      const [year, month, day] = String(dateText || '').split('-').map(Number);
      if (!year || !month || !day) return '';
      const dt = new Date(Date.UTC(year, month - 1, day));
      dt.setUTCDate(dt.getUTCDate() + offsetDays);
      return dt.toISOString().slice(0, 10);
    }

    function getDeltaVsDate(row, offsetDays) {
      const rows = getCurrentRows();
      const rowMap = new Map(rows.map(item => [item.date, item]));
      const compareDate = shiftDate(row.date, -offsetDays);
      const baseRow = rowMap.get(compareDate);
      if (!baseRow) return null;
      return {
        delta: row.total - baseRow.total,
        percent: baseRow.total > 0 ? ((row.total - baseRow.total) / baseRow.total) * 100 : null
      };
    }

    function formatDeltaWithPercent(result) {
      if (!result) return '-';
      const deltaPart = deltaText(result.delta);
      if (!Number.isFinite(result.percent)) return deltaPart;
      const sign = result.percent > 0 ? '+' : '';
      return deltaPart + '（' + sign + result.percent.toFixed(2) + '%）';
    }

    function buildTooltipHtml(row) {
      const week = getDeltaVsDate(row, 7);
      const month = getDeltaVsDate(row, 30);
      const year = getDeltaVsDate(row, 365);
      const labels = getModeMetricLabels();
      return [
        '<strong>' + row.date + '</strong>',
        '<div>' + labels.total + '：' + numberText(row.total) + '</div>',
        '<div>' + labels.delta + '：' + deltaText(row.delta) + '</div>',
        '<div>前7日增量：' + formatDeltaWithPercent(week) + '</div>',
        '<div>前30日增量：' + (month ? deltaText(month.delta) : '-') + '</div>',
        '<div>上年增量：' + (year ? deltaText(year.delta) : '-') + '</div>'
      ].join('');
    }

    function hideTooltip() {
      chartTooltip.classList.remove('show');
    }

    function showTooltip(clientX, clientY, row) {
      chartTooltip.innerHTML = buildTooltipHtml(row);
      chartTooltip.classList.add('show');
      const wrapRect = chartCanvas.parentElement.getBoundingClientRect();
      const tipRect = chartTooltip.getBoundingClientRect();
      let left = clientX - wrapRect.left + 14;
      let top = clientY - wrapRect.top - tipRect.height - 14;
      if (left + tipRect.width > wrapRect.width - 8) left = wrapRect.width - tipRect.width - 8;
      if (left < 8) left = 8;
      if (top < 8) top = clientY - wrapRect.top + 14;
      if (top + tipRect.height > wrapRect.height - 8) top = wrapRect.height - tipRect.height - 8;
      chartTooltip.style.left = left + 'px';
      chartTooltip.style.top = top + 'px';
    }

    function getRangeRows() {
      const rows = getCurrentRows();
      if (currentRange === 'all') return rows.slice();
      const days = Number(currentRange);
      if (!days || days <= 0) return rows.slice();
      return rows.slice(-days);
    }

    function updateHeaderSummary() {
      const rows = getCurrentRows();
      const last = rows[rows.length - 1];
      const updatedAtText = document.getElementById('updatedAtText');
      const kpiTotal = document.getElementById('kpiTotal');
      const kpiDelta = document.getElementById('kpiDelta');
      const kpiTotalLabel = document.getElementById('kpiTotalLabel');
      const kpiDeltaLabel = document.getElementById('kpiDeltaLabel');
      const kpiDays = document.getElementById('kpiDays');
      const kpiMode = document.getElementById('kpiMode');
      const modeHint = document.getElementById('modeHint');
      const metricLabels = getModeMetricLabels();
      kpiTotalLabel.textContent = metricLabels.total;
      kpiDeltaLabel.textContent = metricLabels.delta;
      modeHint.textContent = getModeHintText();
      if (!last) {
        updatedAtText.textContent = '更新时间：暂无数据';
        kpiTotal.textContent = '-';
        kpiDelta.textContent = '-';
        kpiDays.textContent = '0';
        kpiMode.textContent = getModeLabel();
        return;
      }
      updatedAtText.textContent = '更新时间：' + last.date + '（上海时间日统计）';
      kpiTotal.textContent = numberText(last.total);
      kpiDelta.textContent = deltaText(last.delta);
      kpiDelta.className = 'value ' + (last.delta > 0 ? 'up' : (last.delta < 0 ? 'down' : ''));
      kpiDays.textContent = String(rows.length);
      kpiMode.textContent = getModeLabel();
    }

    function getLatestMonthKey(rows) {
      const last = rows[rows.length - 1];
      return last && last.date ? String(last.date).slice(0, 7) : '';
    }

    function getPreviousMonthKey(monthKey) {
      const [yearText, monthText] = String(monthKey || '').split('-');
      const year = Number(yearText);
      const month = Number(monthText);
      if (!year || !month) return '';
      const dt = new Date(Date.UTC(year, month - 1, 1));
      dt.setUTCMonth(dt.getUTCMonth() - 1);
      return dt.toISOString().slice(0, 7);
    }

    function sortRowsByDeltaDesc(rows) {
      return rows
        .filter(row => Number.isFinite(Number(row.delta)))
        .slice()
        .sort((a, b) => {
          if (Number(b.delta) !== Number(a.delta)) return Number(b.delta) - Number(a.delta);
          return String(a.date).localeCompare(String(b.date));
        });
    }

    function setInsightCard(valueId, metaId, valueText, metaText, state = '') {
      const valueEl = document.getElementById(valueId);
      const metaEl = document.getElementById(metaId);
      if (!valueEl || !metaEl) return;
      valueEl.textContent = valueText;
      valueEl.className = 'value ' + state;
      metaEl.textContent = metaText;
    }

    function renderTopRows(containerId, rows, emptyText) {
      const container = document.getElementById(containerId);
      if (!container) return;
      if (!rows.length) {
        container.innerHTML = `<div class="top-meta">${emptyText}</div>`;
        return;
      }

      const metricLabels = getModeMetricLabels();

      container.innerHTML = rows.map((row, index) => {
        return '<div class="top-row">' +
          `<div class="top-rank">${index + 1}</div>` +
          '<div class="top-main">' +
            `<div class="top-title">${row.date}</div>` +
            `<div class="top-meta">${metricLabels.delta} ${deltaText(row.delta)} · ${metricLabels.total} ${numberText(row.total)}</div>` +
          '</div>' +
        '</div>';
      }).join('');
    }

    function renderInsights() {
      const rows = getCurrentRows();
      const monthKey = getLatestMonthKey(rows);
      const monthRows = monthKey ? rows.filter(row => String(row.date).startsWith(monthKey)) : [];
      const prevMonthKey = getPreviousMonthKey(monthKey);
      const prevMonthRows = prevMonthKey ? rows.filter(row => String(row.date).startsWith(prevMonthKey)) : [];
      const monthSorted = sortRowsByDeltaDesc(monthRows).filter(row => Number(row.delta) > 0);
      const prevMonthSorted = sortRowsByDeltaDesc(prevMonthRows).filter(row => Number(row.delta) > 0);
      const allSorted = sortRowsByDeltaDesc(rows).filter(row => Number(row.delta) > 0);
      const monthPeak = monthSorted[0] || null;
      const prevMonthPeak = prevMonthSorted[0] || null;
      const allPeak = allSorted[0] || null;
      const latestSeven = rows.slice(-7);
      const weekAvg = latestSeven.length
        ? latestSeven.reduce((acc, row) => acc + Number(row.delta || 0), 0) / latestSeven.length
        : 0;
      const monthTotal = monthRows.reduce((acc, row) => acc + Number(row.delta || 0), 0);
      const metricLabels = getModeMetricLabels();

      setInsightCard(
        'monthPeakValue',
        'monthPeakMeta',
        monthPeak ? deltaText(monthPeak.delta) : '-',
        monthPeak ? `${monthPeak.date} · ${monthKey}` : '本月暂无增长记录',
        monthPeak && monthPeak.delta > 0 ? 'up' : ''
      );
      setInsightCard(
        'allPeakValue',
        'allPeakMeta',
        allPeak ? deltaText(allPeak.delta) : '-',
        allPeak ? `${allPeak.date} · 历史最高` : '历史暂无增长记录',
        allPeak && allPeak.delta > 0 ? 'up' : ''
      );
      setInsightCard(
        'weekAvgValue',
        'weekAvgMeta',
        latestSeven.length ? deltaText(Math.round(weekAvg * 10) / 10) : '-',
        latestSeven.length ? metricLabels.avg : '最近 7 日暂无数据',
        weekAvg > 0 ? 'up' : (weekAvg < 0 ? 'down' : '')
      );
      setInsightCard(
        'monthTotalValue',
        'monthTotalMeta',
        monthKey ? deltaText(monthTotal) : '-',
        monthKey ? `${monthKey} ${metricLabels.month}` : '暂无月份数据',
        monthTotal > 0 ? 'up' : (monthTotal < 0 ? 'down' : '')
      );
      setInsightCard(
        'prevMonthPeakValue',
        'prevMonthPeakMeta',
        prevMonthPeak ? deltaText(prevMonthPeak.delta) : '-',
        prevMonthPeak ? `${prevMonthPeak.date} · ${prevMonthKey}` : '上月暂无增长记录',
        prevMonthPeak && prevMonthPeak.delta > 0 ? 'up' : ''
      );

      renderTopRows('monthTopList', monthSorted.slice(0, 5), '本月暂无高点数据');
      renderTopRows('allTimeTopList', allSorted.slice(0, 5), '历史暂无高点数据');
    }

    function drawChart() {
      const rows = getRangeRows();
      const rect = chartCanvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(320, Math.floor(rect.width));
      const height = 360;
      chartCanvas.width = Math.floor(width * dpr);
      chartCanvas.height = Math.floor(height * dpr);
      const ctx = chartCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { left: 66, right: 22, top: 16, bottom: 42 };
      const cw = width - pad.left - pad.right;
      const ch = height - pad.top - pad.bottom;

      if (!rows.length) {
        chartState = null;
        hideTooltip();
        ctx.fillStyle = '#6c757d';
        ctx.font = '14px sans-serif';
        ctx.fillText('暂无数据', 16, 30);
        return;
      }

      const values = rows.map(r => currentMetric === 'total' ? Number(r.total || 0) : Number(r.delta || 0));
      let min = Math.min(...values);
      let max = Math.max(...values);
      if (min === max) {
        min -= 1;
        max += 1;
      }
      const padY = (max - min) * 0.08;
      min -= padY;
      max += padY;
      if (min < 0) min = 0;
      if (max <= min) max = min + 1;

      ctx.strokeStyle = '#edf2f7';
      ctx.lineWidth = 1;
      ctx.fillStyle = '#6c757d';
      ctx.font = '12px sans-serif';
      for (let i = 0; i <= 5; i++) {
        const y = pad.top + (ch / 5) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        const val = max - (max - min) * (i / 5);
        ctx.fillText(numberText(Math.round(val)), 8, y + 4);
      }

      const xAt = idx => pad.left + (rows.length === 1 ? cw / 2 : (cw * idx) / (rows.length - 1));
      const yAt = v => pad.top + ((max - v) / (max - min)) * ch;
      chartState = { rows, pad, width, height, xAt, yAt, values };

      const lineColor = currentMode === 'publish'
        ? '#1a8f4c'
        : (currentMode === 'publishViews' ? '#d97706' : '#00a1d6');
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      values.forEach((v, i) => {
        const x = xAt(i);
        const y = yAt(v);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();

      ctx.fillStyle = lineColor;
      values.forEach((v, i) => {
        const x = xAt(i);
        const y = yAt(v);
        ctx.beginPath();
        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = '#6c757d';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(rows[0].date, pad.left, height - 12);
      ctx.textAlign = 'right';
      ctx.fillText(rows[rows.length - 1].date, width - pad.right, height - 12);
      ctx.textAlign = 'left';
      rangeTextEl.textContent = getModeLabel() + '：' + rows[0].date + ' 至 ' + rows[rows.length - 1].date + '（' + rows.length + ' 天）';
    }

    function renderTable() {
      const rows = getCurrentRows().slice().reverse();
      const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const pageRows = rows.slice(start, start + pageSize);

      tableBody.innerHTML = pageRows.map(row => {
        return '<tr>' +
          '<td>' + row.date + '</td>' +
          '<td>' + numberText(row.total) + '</td>' +
          '<td><span class="' + deltaClass(row.delta) + '">' + deltaText(row.delta) + '</span></td>' +
          '</tr>';
      }).join('');

      pagerInfo.textContent = getModeLabel() + '：第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + rows.length + ' 条';
      pageInput.value = String(currentPage);
      pageInput.max = String(totalPages);
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
      goPageBtn.disabled = totalPages <= 1;
    }

    function goToPage(targetPage) {
      const rows = getCurrentRows().slice().reverse();
      const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
      const nextPage = Math.min(totalPages, Math.max(1, Number(targetPage) || 1));
      currentPage = nextPage;
      renderTable();
    }

    function refreshView() {
      currentPage = 1;
      updateHeaderSummary();
      renderInsights();
      drawChart();
      renderTable();
    }

    function bindEvents() {
      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.range-btn').forEach(x => x.classList.remove('active'));
          btn.classList.add('active');
          currentRange = btn.dataset.range;
          drawChart();
        });
      });

      metricSelect.addEventListener('change', () => {
        currentMetric = metricSelect.value;
        drawChart();
      });

      modeSelect.addEventListener('change', () => {
        currentMode = modeSelect.value;
        refreshView();
      });

      prevPageBtn.addEventListener('click', () => {
        goToPage(currentPage - 1);
      });
      nextPageBtn.addEventListener('click', () => {
        goToPage(currentPage + 1);
      });
      goPageBtn.addEventListener('click', () => {
        goToPage(pageInput.value);
      });
      pageInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          goToPage(pageInput.value);
        }
      });

      window.addEventListener('resize', drawChart);
      chartCanvas.addEventListener('mouseleave', hideTooltip);
      chartCanvas.addEventListener('mousemove', event => {
        if (!chartState || !chartState.rows.length) {
          hideTooltip();
          return;
        }
        const rect = chartCanvas.getBoundingClientRect();
        const localX = event.clientX - rect.left;
        const localY = event.clientY - rect.top;
        const minX = chartState.pad.left;
        const maxX = chartState.width - chartState.pad.right;
        const minY = chartState.pad.top;
        const maxY = chartState.height - chartState.pad.bottom;
        if (localX < minX || localX > maxX || localY < minY || localY > maxY) {
          hideTooltip();
          return;
        }
        let bestIndex = 0;
        let bestDistance = Infinity;
        chartState.rows.forEach((row, index) => {
          const distance = Math.abs(chartState.xAt(index) - localX);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        });
        const row = chartState.rows[bestIndex];
        showTooltip(event.clientX, event.clientY, row);
      });

      const backTopBtn = document.getElementById('backTopBtn');
      const updateBackTop = () => backTopBtn.classList.toggle('show', window.scrollY > 260);
      window.addEventListener('scroll', updateBackTop, { passive: true });
      backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      updateBackTop();
    }

    async function loadGrowthRows() {
      const res = await fetch('/api/song-growth');
      if (!res.ok) throw new Error(`API 状态码 ${res.status}`);
      const payload = await res.json();
      growthData.collection = Array.isArray(payload.collectionRows) ? payload.collectionRows : [];
      growthData.publish = Array.isArray(payload.publishRows) ? payload.publishRows : [];
      growthData.publishViews = Array.isArray(payload.publishViewRows) ? payload.publishViewRows : [];
      if (!growthData[currentMode].length) {
        if (growthData.publish.length) {
          currentMode = 'publish';
        } else if (growthData.collection.length) {
          currentMode = 'collection';
        } else if (growthData.publishViews.length) {
          currentMode = 'publishViews';
        }
        modeSelect.value = currentMode;
      }
    }

    async function initPage() {
      bindEvents();
      try {
        await loadGrowthRows();
      } catch (error) {
        document.getElementById('updatedAtText').textContent = '更新时间：加载失败';
        console.error(error);
      }
      refreshView();
    }

    initPage();
  </script>
  <script src="/last-run-badge.js"></script>
</body>
</html>
