<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歌曲增长日报</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/site-theme.css">
  <style>
    * { box-sizing: border-box }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 28px 16px;
      color: #24323f;
    }
    .main { max-width: 1480px; margin: 0 auto }
    .panel {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 3px 14px rgba(0,0,0,.06);
      padding: 20px;
      border: 1px solid #d0d7de;
    }
    h1 { margin: 0 0 8px; color: #2c3e50 }
    .sub {
      margin-bottom: 14px;
      color: #6c757d;
      font-size: 14px;
      line-height: 1.5;
    }
    .nav {
      margin-bottom: 16px;
      text-align: center;
      color: #6c757d;
      font-size: 14px;
    }
    .nav a {
      color: #00a1d6;
      text-decoration: none;
      font-weight: 600;
    }
    .nav a:hover { text-decoration: underline }
    .hint-box {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #d0d7de;
      color: #52606d;
      font-size: 13px;
      line-height: 1.6;
    }
    .summary-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .summary-panel {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .summary-panel h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #1f2328;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .kpi {
      background: #f8fafc;
      border: 1px solid #e7edf3;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .kpi .label {
      font-size: 12px;
      color: #7b8794;
      margin-bottom: 4px;
    }
    .kpi .value {
      font-size: 20px;
      color: #203040;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .metric-select {
      padding: 6px 10px;
      border: 1px solid #d6e3ef;
      border-radius: 8px;
      background: #fff;
    }
    .range-btn {
      border: 1px solid #d6e3ef;
      background: #fff;
      color: #335;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
    }
    .range-btn.active {
      background: #00a1d6;
      color: #fff;
      border-color: #00a1d6;
    }
    .chart-wrap {
      position: relative;
      border: 1px solid #e7edf3;
      border-radius: 12px;
      background: #fff;
      padding: 10px;
    }
    #growthChart {
      width: 100%;
      height: 360px;
      display: block;
    }
    .chart-foot {
      display: flex;
      justify-content: space-between;
      color: #6c757d;
      font-size: 12px;
      margin-top: 8px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .legend {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }
    .chart-tooltip {
      position: absolute;
      display: none;
      min-width: 220px;
      max-width: 320px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(32, 48, 64, .95);
      color: #fff;
      font-size: 12px;
      line-height: 1.6;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
      pointer-events: none;
      z-index: 20;
    }
    .chart-tooltip.show { display: block }
    .chart-tooltip strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .table-wrap {
      margin-top: 18px;
      overflow: auto;
      border: 1px solid #e7edf3;
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      border-bottom: 1px solid #eef2f6;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #f8fafc;
      color: #33475b;
    }
    tbody tr:hover { background: #f9fcff }
    .pager {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .pager-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pager-btn {
      padding: 6px 10px;
      border: 1px solid #d6e3ef;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
    }
    .pager-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .pager .info {
      font-size: 13px;
      color: #6c757d;
    }
    .pager-input {
      width: 72px;
      padding: 6px 8px;
      border: 1px solid #d6e3ef;
      border-radius: 8px;
      background: #fff;
    }
    .back-top {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: #00a1d6;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,161,214,.35);
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: all .2s;
      z-index: 3000;
    }
    .back-top.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    @media (max-width: 980px) {
      body { padding: 16px 12px }
      .summary-board { grid-template-columns: 1fr }
    }
  </style>
</head>
<body>
  <div class="main panel">
    <h1>歌曲增长日报</h1>
    <div class="sub" id="updatedAtText">更新时间：加载中…</div>
    <div class="nav">
      <a href="/">首页</a> |
      <a href="/stats">数据</a> |
      <a href="/bv">BV查重</a> |
      <a href="/dup">歌名歌手查重</a> |
      <a href="/check">命名工具</a> |
      日报
    </div>
    <div class="hint-box">
      仅按 <code>发布日期</code> 统计并合并展示两条维度：<b>播放量</b> 与 <b>曲目</b>。支持切换查看
      <b>累计总量</b> 与 <b>当日总量</b>。
    </div>

    <div class="summary-board">
      <div class="summary-panel">
        <h3>累计总量</h3>
        <div class="kpis">
          <div class="kpi"><div class="label">累计总播放</div><div class="value" id="kpiTotalViews">-</div></div>
          <div class="kpi"><div class="label">累计总曲目</div><div class="value" id="kpiTotalSongs">-</div></div>
          <div class="kpi"><div class="label">累计商值（播放/曲目）</div><div class="value" id="kpiTotalRatio">-</div></div>
          <div class="kpi"><div class="label">统计天数</div><div class="value" id="kpiDays">-</div></div>
        </div>
      </div>
      <div class="summary-panel">
        <h3>当日总量</h3>
        <div class="kpis">
          <div class="kpi"><div class="label">当日播放量</div><div class="value" id="kpiDailyViews">-</div></div>
          <div class="kpi"><div class="label">当日曲目增量</div><div class="value" id="kpiDailySongs">-</div></div>
          <div class="kpi"><div class="label">当日商值（播放/曲目）</div><div class="value" id="kpiDailyRatio">-</div></div>
          <div class="kpi"><div class="label">最新日期</div><div class="value" id="kpiLatestDate">-</div></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <select class="metric-select" id="metricGroupSelect">
        <option value="total" selected>累计总量（播放 + 曲目）</option>
        <option value="delta">当日总量（播放 + 曲目）</option>
      </select>
      <button class="range-btn active" data-range="30">近30天</button>
      <button class="range-btn" data-range="90">近90天</button>
      <button class="range-btn" data-range="180">近180天</button>
      <button class="range-btn" data-range="all">全部</button>
    </div>

    <div class="chart-wrap">
      <canvas id="growthChart"></canvas>
      <div class="chart-tooltip" id="chartTooltip"></div>
      <div class="chart-foot">
        <span id="chartRangeText"></span>
        <span class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:#d97706"></span>播放量</span>
          <span class="legend-item"><span class="legend-dot" style="background:#1a8f4c"></span>曲目</span>
          <span class="legend-item"><span class="legend-dot" style="background:#7c3aed"></span>商值(播放/曲目)</span>
        </span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>累计总播放</th>
            <th>累计总曲目</th>
            <th>累计商值</th>
            <th>当日播放量</th>
            <th>当日曲目增量</th>
            <th>当日商值</th>
          </tr>
        </thead>
        <tbody id="growthTableBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <div class="info" id="pagerInfo"></div>
      <div class="pager-controls">
        <button class="pager-btn" id="prevPageBtn">上一页</button>
        <button class="pager-btn" id="nextPageBtn">下一页</button>
        <input class="pager-input" id="pageInput" type="number" min="1" step="1" placeholder="页码" />
        <button class="pager-btn" id="goPageBtn">跳转</button>
      </div>
    </div>
  </div>

  <button class="back-top" id="backTopBtn" type="button" aria-label="回到顶部">↑</button>

  <script>
    const chartCanvas = document.getElementById('growthChart');
    const chartTooltip = document.getElementById('chartTooltip');
    const chartRangeText = document.getElementById('chartRangeText');
    const metricGroupSelect = document.getElementById('metricGroupSelect');
    const tableBody = document.getElementById('growthTableBody');
    const pagerInfo = document.getElementById('pagerInfo');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const pageInput = document.getElementById('pageInput');
    const goPageBtn = document.getElementById('goPageBtn');

    const growthData = { rows: [] };
    let currentRange = '30';
    let currentMetricGroup = 'total';
    let currentPage = 1;
    const pageSize = 30;
    let chartState = null;

    function numberText(value) {
      return Number(value || 0).toLocaleString('zh-CN');
    }

    function parseNumber(value) {
      const n = Number(value || 0);
      return Number.isFinite(n) ? n : 0;
    }

    function ratioValue(numerator, denominator) {
      const top = parseNumber(numerator);
      const bottom = parseNumber(denominator);
      if (bottom <= 0) return null;
      return top / bottom;
    }

    function ratioText(value) {
      const ratio = Number(value);
      if (!Number.isFinite(ratio)) return '-';
      return `${ratio.toFixed(2)} 次/曲`;
    }

    function normalizeCombinedRows(rows) {
      return (Array.isArray(rows) ? rows : [])
        .map(row => ({
          date: String(row?.date || ''),
          ts: parseNumber(row?.ts),
          songDelta: parseNumber(row?.songDelta),
          songTotal: parseNumber(row?.songTotal),
          viewDelta: parseNumber(row?.viewDelta),
          viewTotal: parseNumber(row?.viewTotal)
        }))
        .filter(row => row.date)
        .sort((a, b) => rowDateCompare(a.date, b.date));
    }

    function rowDateCompare(a, b) {
      return String(a).localeCompare(String(b));
    }

    function buildCombinedRowsFromLegacy(songRows, viewRows) {
      const dateMap = new Map();

      (Array.isArray(songRows) ? songRows : []).forEach(row => {
        const date = String(row?.date || '');
        if (!date) return;
        if (!dateMap.has(date)) {
          dateMap.set(date, { date, ts: 0, songDelta: 0, viewDelta: 0 });
        }
        const entry = dateMap.get(date);
        entry.songDelta += parseNumber(row?.delta);
        entry.ts = Math.max(entry.ts, parseNumber(row?.ts));
      });

      (Array.isArray(viewRows) ? viewRows : []).forEach(row => {
        const date = String(row?.date || '');
        if (!date) return;
        if (!dateMap.has(date)) {
          dateMap.set(date, { date, ts: 0, songDelta: 0, viewDelta: 0 });
        }
        const entry = dateMap.get(date);
        entry.viewDelta += parseNumber(row?.delta);
        entry.ts = Math.max(entry.ts, parseNumber(row?.ts));
      });

      let songTotal = 0;
      let viewTotal = 0;
      return Array.from(dateMap.values())
        .sort((a, b) => rowDateCompare(a.date, b.date))
        .map(row => {
          songTotal += parseNumber(row.songDelta);
          viewTotal += parseNumber(row.viewDelta);
          return {
            date: row.date,
            ts: row.ts || 0,
            songDelta: parseNumber(row.songDelta),
            songTotal,
            viewDelta: parseNumber(row.viewDelta),
            viewTotal
          };
        });
    }

    function getRangeRows() {
      const rows = growthData.rows;
      if (currentRange === 'all') return rows.slice();
      const days = Number(currentRange);
      if (!days || days <= 0) return rows.slice();
      return rows.slice(-days);
    }

    function getMetricLabels() {
      if (currentMetricGroup === 'delta') {
        return { view: '当日播放量', song: '当日曲目增量', group: '当日总量' };
      }
      return { view: '累计总播放', song: '累计总曲目', group: '累计总量' };
    }

    function getSeriesValues(row) {
      if (currentMetricGroup === 'delta') {
        return {
          view: parseNumber(row?.viewDelta),
          song: parseNumber(row?.songDelta),
          ratio: ratioValue(row?.viewDelta, row?.songDelta)
        };
      }
      return {
        view: parseNumber(row?.viewTotal),
        song: parseNumber(row?.songTotal),
        ratio: ratioValue(row?.viewTotal, row?.songTotal)
      };
    }

    function updateSummary() {
      const rows = growthData.rows;
      const last = rows[rows.length - 1];
      document.getElementById('updatedAtText').textContent = last
        ? `更新时间：${last.date}（上海时间日统计）`
        : '更新时间：暂无数据';
      document.getElementById('kpiTotalViews').textContent = last ? numberText(last.viewTotal) : '-';
      document.getElementById('kpiTotalSongs').textContent = last ? numberText(last.songTotal) : '-';
      document.getElementById('kpiTotalRatio').textContent = last ? ratioText(ratioValue(last.viewTotal, last.songTotal)) : '-';
      document.getElementById('kpiDailyViews').textContent = last ? numberText(last.viewDelta) : '-';
      document.getElementById('kpiDailySongs').textContent = last ? numberText(last.songDelta) : '-';
      document.getElementById('kpiDailyRatio').textContent = last ? ratioText(ratioValue(last.viewDelta, last.songDelta)) : '-';
      document.getElementById('kpiLatestDate').textContent = last ? last.date : '-';
      document.getElementById('kpiDays').textContent = String(rows.length || 0);
    }

    function buildAxisRange(values) {
      const max = Math.max(0, ...values);
      const paddedMax = max > 0 ? max * 1.12 : 1;
      return { min: 0, max: paddedMax };
    }

    function drawSeries(ctx, rows, xAt, yAt, values, color, options = {}) {
      const dashed = !!options.dashed;
      ctx.save();
      if (dashed) {
        ctx.setLineDash([6, 4]);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      let started = false;
      ctx.beginPath();
      values.forEach((v, index) => {
        if (!Number.isFinite(Number(v))) {
          started = false;
          return;
        }
        const x = xAt(index);
        const y = yAt(v);
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
          return;
        }
        ctx.lineTo(x, y);
      });
      ctx.stroke();
      if (dashed) {
        ctx.setLineDash([]);
      }

      ctx.fillStyle = color;
      values.forEach((v, index) => {
        if (!Number.isFinite(Number(v))) return;
        const x = xAt(index);
        const y = yAt(v);
        ctx.beginPath();
        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawChart() {
      const rows = getRangeRows();
      const rect = chartCanvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(320, Math.floor(rect.width));
      const height = 360;
      chartCanvas.width = Math.floor(width * dpr);
      chartCanvas.height = Math.floor(height * dpr);

      const ctx = chartCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { left: 68, right: 68, top: 16, bottom: 42 };
      const cw = width - pad.left - pad.right;
      const ch = height - pad.top - pad.bottom;

      if (!rows.length) {
        chartState = null;
        chartRangeText.textContent = '暂无可展示数据';
        ctx.fillStyle = '#6c757d';
        ctx.font = '14px sans-serif';
        ctx.fillText('暂无数据', 16, 30);
        return;
      }

      const labels = getMetricLabels();
      const viewValues = rows.map(row => getSeriesValues(row).view);
      const songValues = rows.map(row => getSeriesValues(row).song);
      const ratioValues = rows.map(row => getSeriesValues(row).ratio);
      const viewAxis = buildAxisRange(viewValues);
      const songAxis = buildAxisRange(songValues);
      const ratioAxis = buildAxisRange(ratioValues.filter(value => Number.isFinite(Number(value))));

      const xAt = index => pad.left + (rows.length === 1 ? cw / 2 : (cw * index) / (rows.length - 1));
      const yViewAt = value => pad.top + ((viewAxis.max - value) / (viewAxis.max - viewAxis.min)) * ch;
      const ySongAt = value => pad.top + ((songAxis.max - value) / (songAxis.max - songAxis.min)) * ch;
      const yRatioAt = value => pad.top + ((ratioAxis.max - value) / (ratioAxis.max - ratioAxis.min)) * ch;

      ctx.strokeStyle = '#edf2f7';
      ctx.lineWidth = 1;
      ctx.fillStyle = '#6c757d';
      ctx.font = '12px sans-serif';
      for (let i = 0; i <= 5; i += 1) {
        const y = pad.top + (ch / 5) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();

        const viewValue = viewAxis.max - ((viewAxis.max - viewAxis.min) * i) / 5;
        const songValue = songAxis.max - ((songAxis.max - songAxis.min) * i) / 5;
        ctx.textAlign = 'left';
        ctx.fillText(numberText(Math.round(viewValue)), 8, y + 4);
        ctx.textAlign = 'right';
        ctx.fillText(numberText(Math.round(songValue)), width - 8, y + 4);
      }

      drawSeries(ctx, rows, xAt, yViewAt, viewValues, '#d97706');
      drawSeries(ctx, rows, xAt, ySongAt, songValues, '#1a8f4c');
      drawSeries(ctx, rows, xAt, yRatioAt, ratioValues, '#7c3aed', { dashed: true });

      ctx.fillStyle = '#6c757d';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(rows[0].date, pad.left, height - 12);
      ctx.textAlign = 'right';
      ctx.fillText(rows[rows.length - 1].date, width - pad.right, height - 12);

      const ratioValidValues = ratioValues.filter(value => Number.isFinite(Number(value)));
      const ratioRangeText = ratioValidValues.length
        ? `商值区间 ${ratioText(Math.min(...ratioValidValues))} ~ ${ratioText(Math.max(...ratioValidValues))}`
        : '商值区间 -';
      chartRangeText.textContent = `${labels.group}：${rows[0].date} 至 ${rows[rows.length - 1].date}（${rows.length} 天） | ${ratioRangeText}`;
      chartState = { rows, pad, width, height, xAt, yViewAt, ySongAt };
    }

    function buildTooltipHtml(row) {
      const labels = getMetricLabels();
      const current = getSeriesValues(row);
      return [
        `<strong>${row.date}</strong>`,
        `<div>${labels.view}：${numberText(current.view)}</div>`,
        `<div>${labels.song}：${numberText(current.song)}</div>`,
        `<div>${labels.group}商值：${ratioText(current.ratio)}</div>`,
        `<div>累计总播放：${numberText(row.viewTotal)}</div>`,
        `<div>累计总曲目：${numberText(row.songTotal)}</div>`,
        `<div>累计商值：${ratioText(ratioValue(row.viewTotal, row.songTotal))}</div>`,
        `<div>当日播放量：${numberText(row.viewDelta)}</div>`,
        `<div>当日曲目增量：${numberText(row.songDelta)}</div>`,
        `<div>当日商值：${ratioText(ratioValue(row.viewDelta, row.songDelta))}</div>`
      ].join('');
    }

    function hideTooltip() {
      chartTooltip.classList.remove('show');
    }

    function showTooltip(clientX, clientY, row) {
      chartTooltip.innerHTML = buildTooltipHtml(row);
      chartTooltip.classList.add('show');
      const wrapRect = chartCanvas.parentElement.getBoundingClientRect();
      const tipRect = chartTooltip.getBoundingClientRect();
      let left = clientX - wrapRect.left + 14;
      let top = clientY - wrapRect.top - tipRect.height - 14;
      if (left + tipRect.width > wrapRect.width - 8) left = wrapRect.width - tipRect.width - 8;
      if (left < 8) left = 8;
      if (top < 8) top = clientY - wrapRect.top + 14;
      if (top + tipRect.height > wrapRect.height - 8) top = wrapRect.height - tipRect.height - 8;
      chartTooltip.style.left = `${left}px`;
      chartTooltip.style.top = `${top}px`;
    }

    function renderTable() {
      const rows = growthData.rows.slice().reverse();
      const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const pageRows = rows.slice(start, start + pageSize);

      tableBody.innerHTML = pageRows.map(row => {
        return `<tr>
          <td>${row.date}</td>
          <td>${numberText(row.viewTotal)}</td>
          <td>${numberText(row.songTotal)}</td>
          <td>${ratioText(ratioValue(row.viewTotal, row.songTotal))}</td>
          <td>${numberText(row.viewDelta)}</td>
          <td>${numberText(row.songDelta)}</td>
          <td>${ratioText(ratioValue(row.viewDelta, row.songDelta))}</td>
        </tr>`;
      }).join('');

      pagerInfo.textContent = `日期增长明细：第 ${currentPage} / ${totalPages} 页，共 ${rows.length} 条`;
      pageInput.value = String(currentPage);
      pageInput.max = String(totalPages);
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
      goPageBtn.disabled = totalPages <= 1;
    }

    function goToPage(targetPage) {
      const rows = growthData.rows.slice().reverse();
      const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
      const nextPage = Math.min(totalPages, Math.max(1, Number(targetPage) || 1));
      currentPage = nextPage;
      renderTable();
    }

    function refreshView() {
      currentPage = 1;
      updateSummary();
      drawChart();
      renderTable();
    }

    function bindEvents() {
      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.range-btn').forEach(item => item.classList.remove('active'));
          btn.classList.add('active');
          currentRange = btn.dataset.range;
          drawChart();
        });
      });

      metricGroupSelect.addEventListener('change', () => {
        currentMetricGroup = metricGroupSelect.value;
        drawChart();
      });

      prevPageBtn.addEventListener('click', () => goToPage(currentPage - 1));
      nextPageBtn.addEventListener('click', () => goToPage(currentPage + 1));
      goPageBtn.addEventListener('click', () => goToPage(pageInput.value));
      pageInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') goToPage(pageInput.value);
      });

      chartCanvas.addEventListener('mouseleave', hideTooltip);
      chartCanvas.addEventListener('mousemove', event => {
        if (!chartState || !chartState.rows.length) {
          hideTooltip();
          return;
        }
        const rect = chartCanvas.getBoundingClientRect();
        const localX = event.clientX - rect.left;
        const localY = event.clientY - rect.top;
        const minX = chartState.pad.left;
        const maxX = chartState.width - chartState.pad.right;
        const minY = chartState.pad.top;
        const maxY = chartState.height - chartState.pad.bottom;
        if (localX < minX || localX > maxX || localY < minY || localY > maxY) {
          hideTooltip();
          return;
        }
        let bestIndex = 0;
        let bestDistance = Infinity;
        chartState.rows.forEach((row, index) => {
          const distance = Math.abs(chartState.xAt(index) - localX);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        });
        showTooltip(event.clientX, event.clientY, chartState.rows[bestIndex]);
      });

      window.addEventListener('resize', drawChart);

      const backTopBtn = document.getElementById('backTopBtn');
      const updateBackTop = () => backTopBtn.classList.toggle('show', window.scrollY > 260);
      window.addEventListener('scroll', updateBackTop, { passive: true });
      backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      updateBackTop();
    }

    async function loadGrowthRows() {
      const res = await fetch('/api/song-growth');
      if (!res.ok) throw new Error(`API 状态码 ${res.status}`);
      const payload = await res.json();
      const combinedRows = normalizeCombinedRows(payload?.combinedRows);
      if (combinedRows.length) {
        growthData.rows = combinedRows;
        return;
      }
      growthData.rows = normalizeCombinedRows(
        buildCombinedRowsFromLegacy(payload?.publishRows, payload?.publishViewRows)
      );
    }

    async function initPage() {
      bindEvents();
      try {
        await loadGrowthRows();
      } catch (error) {
        console.error(error);
        document.getElementById('updatedAtText').textContent = '更新时间：加载失败';
      }
      refreshView();
    }

    initPage();
  </script>
  <script src="/page-directory-widget.js?v=2026041905"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof window.createPageDirectory !== 'function') return;
      window.createPageDirectory({
        title: '日报目录',
        items: [
          { label: '口径说明', selector: '.hint-box' },
          { label: '累计总量', selector: '.summary-board .summary-panel:nth-child(1)' },
          { label: '当日总量', selector: '.summary-board .summary-panel:nth-child(2)' },
          { label: '图表参数', selector: '.controls' },
          { label: '趋势图', selector: '.chart-wrap' },
          { label: '数据表', selector: '.table-wrap' },
          { label: '分页', selector: '.pager' }
        ]
      });
    });
  </script>
  <script src="/last-run-badge.js"></script>
</body>
</html>
