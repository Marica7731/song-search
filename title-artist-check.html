<style>

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f6f7f9;padding:20px}

.header{text-align:center;margin-bottom:20px}

.title-search-area{margin-bottom:24px}
#titleInput{width:100%;min-height:160px;padding:12px 14px;border:1px solid #d0d7de;border-radius:6px;font-size:14px;outline:none;transition:border .2s;margin-bottom:16px;resize:vertical;font-family:inherit;background:#fff}

.artist-option.selected{background:#28a745;color:#fff;border-color:#28a745}
.artist-option.max-source{background:#28a745;color:#fff;border-color:#28a745}
.artist-option.user-provided{background:#6f42c1;color:#fff;border-color:#6f42c1}

.source-label{font-size:11px;color:#6c757d;margin-left:6px}
.no-result{color:#6c757d;font-size:13px;padding:4px 0}
.result-generate-area{margin-top:16px;display:none}
.result-generate-area.active{display:block}

.input-help{margin:0 0 14px;padding:12px 14px;border:1px solid #d0d7de;border-radius:6px;background:#fff;color:#495057;line-height:1.7;font-size:13px}

.copy-toast{position:fixed;bottom:30px;right:30px;padding:10px 20px;background:rgba(0,0,0,.8);color:#fff;border-radius:4px;font-size:14px;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none;z-index:9999}
.copy-toast.show{opacity:1;transform:translateY(0)}

<script>
let allSongs = [];
let fileList = [];
let fileAlias = {};
let titleSearchResults = [];
let selectedArtists = {};
let inputFormatType = '';
let isApiMode = false;
let dataReady = false;
let titleFilterMode = 'all';

function getSourceAlias(source) {
  if (!source) return '未知来源';
  const key = source.replace('.js', '');
  return fileAlias[key] || source;
}

function showCopyToast() {
  const toast = document.getElementById('copyToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function ensureReadyPlaceholder() {
  let placeholder = document.getElementById('titleReadyPlaceholder');
  if (placeholder) return placeholder;
  const searchArea = document.querySelector('.title-search-area');
  if (!searchArea || !searchArea.parentNode) return null;
  placeholder = document.createElement('div');
  placeholder.id = 'titleReadyPlaceholder';
  placeholder.className = 'input-help';
  placeholder.innerHTML = '<strong>歌库准备中</strong><br><span data-ready-desc>正在连接服务端歌库...</span>';
  searchArea.parentNode.insertBefore(placeholder, searchArea);
  return placeholder;
}

function setCheckReadyState(ready, message = '') {
  const searchArea = document.querySelector('.title-search-area');
  const placeholder = ensureReadyPlaceholder();
  if (searchArea) {
    searchArea.style.display = ready ? 'block' : 'none';
  }
  if (placeholder) {
    placeholder.style.display = ready ? 'none' : 'block';
    const desc = placeholder.querySelector('[data-ready-desc]');
    if (desc) {
      desc.textContent = message || '歌库尚未完成加载，请稍候。';
    }
  }
  const searchBtn = document.getElementById('searchTitleBtn');
  if (searchBtn) {
    searchBtn.disabled = !ready;
  }
}

async function loadAllData() {
  try {
    try {
      const apiRes = await fetch('/api/bootstrap');
      if (!apiRes.ok) throw new Error(`API 状态码 ${apiRes.status}`);
      const apiData = await apiRes.json();
      fileList = apiData.files || [];
      fileAlias = apiData.fileToAlias || {};
      allSongs = [];
      isApiMode = true;
      dataReady = true;
      setCheckReadyState(true);
      return;
    } catch (apiError) {
      console.warn('API 数据加载失败，回退到静态模式：', apiError);
      isApiMode = false;
      setCheckReadyState(false, '服务端接口不可用，正在回退到静态歌库...');
    }

    const indexRes = await fetch('data/index.json');
    const indexData = await indexRes.json();
    fileList = indexData.files || [];
    fileAlias = indexData.fileToAlias || {};

    const loadFileTasks = fileList.map(fileName =>
      fetch(`data/${fileName}`)
        .then(res => res.text())
        .then(jsContent => {
          const fakeWindow = { SONG_DATA: [] };
          try {
            const executeCode = new Function('window', jsContent);
            executeCode(fakeWindow);
          } catch (e) {
            console.warn(`执行 ${fileName} 出错:`, e.message);
          }
          return fakeWindow.SONG_DATA.map(song => ({ ...song, source: fileName }));
        })
        .catch(() => [])
    );

    const songArrays = await Promise.all(loadFileTasks);
    allSongs = songArrays.flat();
    dataReady = true;
    setCheckReadyState(true);
  } catch (err) {
    setCheckReadyState(false, `歌库加载失败：${err.message}`);
    alert(`数据加载失败: ${err.message}`);
  }
}
</script>

<script>
function initTitleArtistPage() {
  setCheckReadyState(false, '正在连接服务端歌库...');
  loadAllData();
  document.getElementById('searchTitleBtn').addEventListener('click', searchAndValidateArtists);
  document.getElementById('copyVisibleResultBtn').addEventListener('click', copyVisibleResultText);
  document.getElementById('openNeteaseBatchBtn').addEventListener('click', openVisibleNeteaseSearches);
  document.getElementById('neteaseTitleOnly').addEventListener('change', updateNeteaseBatchState);
  document.querySelectorAll('[data-title-filter]').forEach(button => {
    button.addEventListener('click', () => setTitleFilterMode(button.dataset.titleFilter));
  });
  document.getElementById('titleInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) searchAndValidateArtists();
  });

  const backTopBtn = document.getElementById('backTopBtn');
  const updateBackTop = () => backTopBtn.classList.toggle('show', window.scrollY > 260);
  window.addEventListener('scroll', updateBackTop, { passive: true });
  backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  updateBackTop();

  if (typeof window.createPageDirectory === 'function') {
    const clipText = (text, maxLen = 36) => {
      const value = String(text || '').replace(/\s+/g, ' ').trim();
      if (!value) return '';
      return value.length > maxLen ? `${value.slice(0, maxLen - 1)}…` : value;
    };

    const buildNamingDirItems = () => {
      const items = [
        { label: '输入说明', selector: '.input-help' },
        { label: '待校验输入', selector: '#titleInput' }
      ];

      if (document.getElementById('resultGenerateArea')?.classList.contains('active')) {
        items.push({ label: '导出与网易搜索', selector: '#resultGenerateArea' });
      }

      const selectRows = Array.from(document.querySelectorAll('#artistSelectContainer .select-item'));
      if (selectRows.length > 0) {
        items.push({ label: '歌名 - 歌手定位', selector: '#artistSelectArea' });
        selectRows.forEach((row, index) => {
          const rowTitle = row.dataset.dirTitle
            || row.querySelector('h4')?.childNodes?.[0]?.textContent
            || row.querySelector('h4')?.textContent
            || `条目 ${index + 1}`;
          const rowArtist = row.dataset.dirArtist || '';
          const rowLabel = row.dataset.dirLabel
            || (rowArtist ? `${rowTitle} - ${rowArtist}` : rowTitle)
            || `条目 ${index + 1}`;
          items.push({
            label: `${index + 1}. ${clipText(rowLabel, 34)}`,
            primary: clipText(rowTitle, 34),
            secondary: clipText(rowArtist || '未选歌手', 28),
            badge: `${index + 1}.`,
            target: row
          });
        });
      } else {
        items.push({ label: '歌手校验区', selector: '#artistSelectArea' });
      }

      return items;
    };

    const dir = window.createPageDirectory({
      title: '目录',
      mount: '#checkDirectorySlot',
      items: buildNamingDirItems()
    });

    let refreshTimer = null;
    const queueRefresh = () => {
      if (refreshTimer) window.clearTimeout(refreshTimer);
      refreshTimer = window.setTimeout(() => {
        dir.setItems(buildNamingDirItems());
      }, 80);
    };

    const observeTargets = ['#artistSelectContainer', '#artistSelectArea', '#resultGenerateArea'];
    observeTargets.forEach(selector => {
      const el = document.querySelector(selector);
      if (!el) return;
      const observer = new MutationObserver(queueRefresh);
      observer.observe(el, { childList: true, subtree: true, attributes: true, attributeFilter: ['class', 'data-dir-label'] });
    });

    window.refreshNamingToolDirectory = queueRefresh;
    queueRefresh();
  }
}
document.addEventListener('DOMContentLoaded', initTitleArtistPage);
</script>
